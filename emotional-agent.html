<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小暖 — 情感沟通助手</title>
<style>
/* ========================================
   CSS Reset & Variables
   ======================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08090d;
  --title: #b98eff;
  --accent: #e85d75;
  --text: #f6f2e8;
  --text-dim: #aaa59a;
  --text-muted: #746f66;
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --font: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
  --sidebar-width: 260px;
  --settings-width: 340px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px);
}

/* ========================================
   Layout Shell
   ======================================== */
#app {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  z-index: 1;
}

/* ========================================
   Scrollbar
   ======================================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ========================================
   Buttons & Inputs (base)
   ======================================== */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}

input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
}

/* ========================================
   Toast
   ======================================== */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 360px;
}
.toast.error { background: rgba(232,93,117,0.15); border: 1px solid rgba(232,93,117,0.25); }
.toast.success { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.2); }
.toast.info { background: rgba(185,142,255,0.1); border: 1px solid rgba(185,142,255,0.18); }

@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ========================================
   Animations
   ======================================== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div id="app">
  <!-- Task 7: Sidebar -->
  <!-- Task 7: Chat Area -->
  <!-- Task 10: Settings Drawer -->
</div>

/* ========================================
   INIT — 页面加载入口（后续任务填充）
   ======================================== */

  console.log('[小暖] App shell loaded');
});
</script>

</body>
</html>
