<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小暖 — 情感沟通助手</title>
<style>
/* ========================================
   CSS Reset & Variables
   ======================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08090d;
  --title: #b98eff;
  --accent: #e85d75;
  --text: #f6f2e8;
  --text-dim: #aaa59a;
  --text-muted: #746f66;
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --font: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
  --sidebar-width: 260px;
  --settings-width: 340px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px);
}

/* ========================================
   Layout Shell
   ======================================== */
#app {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  z-index: 1;
}

/* ========================================
   Scrollbar
   ======================================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ========================================
   Buttons & Inputs (base)
   ======================================== */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}

input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
}

/* ========================================
   Toast
   ======================================== */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 360px;
}
.toast.error { background: rgba(232,93,117,0.15); border: 1px solid rgba(232,93,117,0.25); }
.toast.success { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.2); }
.toast.info { background: rgba(185,142,255,0.1); border: 1px solid rgba(185,142,255,0.18); }

@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ========================================
   Animations
   ======================================== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ========================================
   Sidebar
   ======================================== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100%;
  background: rgba(255,255,255,0.015);
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-header {
  padding: 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--card-border);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
  color: var(--title);
}
.sidebar-logo .logo-icon { font-size: 24px; }
.sidebar-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(185,142,255,0.1);
  color: var(--title);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.sidebar-btn:hover { background: rgba(185,142,255,0.2); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.chat-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
  position: relative;
  margin-bottom: 2px;
}
.chat-item:hover { background: rgba(255,255,255,0.04); }
.chat-item.active { background: rgba(185,142,255,0.08); color: var(--text); }
.chat-item .chat-icon { font-size: 14px; flex-shrink: 0; opacity: 0.6; }
.chat-item .chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-item .chat-delete {
  opacity: 0;
  width: 24px; height: 24px;
  border-radius: 4px;
  background: transparent;
  color: var(--text-muted);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.chat-item:hover .chat-delete { opacity: 1; }
.chat-item .chat-delete:hover { background: rgba(232,93,117,0.15); color: var(--accent); }
.chat-item .chat-rename-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--title);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  padding: 2px 6px;
}

.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--card-border);
}
.sidebar-footer-btn {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  transition: all 0.15s;
}
.sidebar-footer-btn:hover { background: rgba(232,93,117,0.08); color: var(--accent); }

/* ========================================
   Main Chat Area
   ======================================== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
  position: relative;
}
.main-area.is-empty {
  justify-content: center;
  align-items: center;
}
.main-area.is-empty .chat-header-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 5;
}
.main-area.is-empty .chat-messages {
  flex: 0 0 auto;
  width: 600px;
  max-width: calc(100% - 40px);
}
.main-area.is-empty .empty-state {
  padding: 0 0 20px 0;
}
.main-area.is-empty .chat-input-area {
  max-width: 600px;
  width: calc(100% - 40px);
  margin: 0;
  border-top: none;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
}

.chat-header-bar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.chat-header-title { font-size: 15px; font-weight: 600; color: var(--text); }
.chat-header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  transition: max-width 0.45s cubic-bezier(.22,1,.36,1),
              width 0.45s cubic-bezier(.22,1,.36,1),
              flex 0.45s cubic-bezier(.22,1,.36,1);
}

.empty-state {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  transition: opacity 0.3s ease;
}
.empty-state[style*="display: none"] { opacity: 0; }
.empty-icon { font-size: 56px; opacity: 0.4; transition: opacity 0.3s ease; }
.empty-text { font-size: 15px; }
.empty-hint { font-size: 12px; opacity: 0.6; }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--card-border);
  display: flex; align-items: flex-end; gap: 10px;
  flex-shrink: 0;
  transition: max-width 0.45s cubic-bezier(.22,1,.36,1),
              border-radius 0.45s cubic-bezier(.22,1,.36,1),
              background 0.45s ease,
              border-color 0.45s ease,
              margin 0.45s cubic-bezier(.22,1,.36,1);
}
.chat-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  resize: none;
  max-height: 120px;
  min-height: 20px;
  line-height: 1.5;
  transition: height 0.15s ease, border-color 0.25s ease;
}
.chat-input:focus { border-color: var(--title); }
.chat-input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 40px; height: 40px;
  min-width: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--title), #9b6fff);
  color: white;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.25s ease;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.35; cursor: default; transform: scale(0.95); }

/* ========================================
   Message Bubbles
   ======================================== */
.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: msgIn 0.45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.msg-row.user .msg-avatar {
  width: 40px; height: 40px;
  font-size: 20px;
  background: linear-gradient(135deg, #e8b4c8, #d495ae);
  position: relative;
}
.msg-row.user .msg-avatar::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fce4ec;
  top: 7px; left: 50%; transform: translateX(-50%);
}
.msg-row.user .msg-avatar::after {
  content: '';
  position: absolute;
  width: 22px; height: 14px;
  border-radius: 11px 11px 3px 3px;
  background: #fce4ec;
  bottom: 7px; left: 50%; transform: translateX(-50%);
}
.msg-row.agent .msg-avatar {
  width: 36px; height: 36px;
  font-size: 18px;
  background: linear-gradient(135deg, #d4a0ff, #f28b9f);
}

/* 内容包裹层 — 防止flex撑开 */
.msg-content {
  flex: 0 1 auto;
  min-width: 0;
  max-width: calc(100% - 52px);
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
.msg-row.user .msg-bubble {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: var(--text);
}
.msg-row.agent .msg-bubble {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  color: var(--text);
}

/* streaming 光标 */
.msg-row.agent .msg-bubble.streaming::after {
  content: ' ▌';
  animation: blink 0.8s infinite;
  color: var(--title);
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
  padding: 0 4px;
}
.msg-row.user .msg-time { text-align: right; }

/* Reject card */
.reject-card {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid rgba(232,93,117,0.2);
  background: rgba(232,93,117,0.05);
  color: var(--accent);
  font-size: 13px;
  line-height: 1.6;
  animation: msgIn 0.45s cubic-bezier(.22,1,.36,1) both;
}

/* Error bubble */
.msg-row.error .msg-bubble {
  border: 1px solid rgba(232,93,117,0.3) !important;
}
.msg-actions {
  display: flex; gap: 8px; margin-top: 6px;
}
.retry-btn {
  padding: 4px 12px;
  border-radius: 6px;
  background: rgba(232,93,117,0.1);
  color: var(--accent);
  font-size: 12px;
  transition: background 0.15s;
}
.retry-btn:hover { background: rgba(232,93,117,0.2); }

/* Typing indicator — 思考动画 */
#typingIndicator .msg-content {
  flex: none; max-width: none; width: auto;
}
#typingIndicator .msg-bubble {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: none; -webkit-backdrop-filter: none;
  font-size: 11px; color: var(--text-dim);
}
#typingIndicator .msg-bubble > * {
  display: contents;
}
#typingIndicator .thinking-label {
  font-size: 11px;
  color: var(--text-dim);
  background: linear-gradient(90deg, var(--text-dim) 0%, var(--title) 50%, var(--text-dim) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
#typingIndicator .thinking-dot {
  display: inline-block;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--title);
  animation: thinkingBounce 1.2s infinite ease-in-out;
}
#typingIndicator .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
#typingIndicator .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* 思考时头像微动 */
.msg-row.agent.thinking {
  gap: 6px;
}
.msg-row.agent.thinking .msg-avatar {
  width: 22px; height: 22px;
  font-size: 11px;
  animation: avatarPulse 2s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* "继续"按钮（中断补全） */
.continue-hint {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  margin-top: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
}
.continue-hint:hover { color: var(--title); }
/* ========================================
   Settings Panel
   ======================================== */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 50;
  display: none;
}
.settings-overlay.open { display: block; }

.settings-panel {
  position: fixed;
  top: 0; right: 0;
  width: var(--settings-width);
  height: 100%;
  background: var(--bg);
  border-left: 1px solid var(--card-border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.22,1,.36,1);
}
.settings-panel.open { transform: translateX(0); }

.settings-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-header h3 { font-size: 16px; color: var(--title); font-weight: 600; }
.close-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: rgba(255,255,255,0.06); }

.settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 18px;
}
.settings-group { display: flex; flex-direction: column; gap: 6px; }
.settings-group label {
  font-size: 12px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.settings-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.settings-input:focus { border-color: var(--title); }
.settings-input::placeholder { color: var(--text-muted); }

.settings-select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.settings-select option { background: #1a1a2e; color: var(--text); }

.settings-hint {
  font-size: 11px; color: var(--text-muted); line-height: 1.5;
}

.settings-divider {
  height: 1px;
  background: var(--card-border);
  margin: 4px 0;
}

.settings-actions {
  display: flex; gap: 10px;
}
.btn-primary {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: rgba(185,142,255,0.15);
  color: var(--title);
  font-size: 13px;
  font-weight: 600;
  transition: background 0.15s;
}
.btn-primary:hover { background: rgba(185,142,255,0.25); }
.btn-danger {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: rgba(232,93,117,0.08);
  color: var(--accent);
  font-size: 13px;
  transition: background 0.15s;
}
.btn-danger:hover { background: rgba(232,93,117,0.18); }

.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
}
.status-badge.ok { background: rgba(76,175,80,0.1); color: #81c784; }
.status-badge.warn { background: rgba(255,152,0,0.1); color: #ffb74d; }

.file-input-hidden { display: none; }

/* ========================================
   Profile Card — 侧边栏紧凑卡片
   ======================================== */
.profile-area { flex-shrink: 0; }
.profile-card {
  margin: 8px 8px 4px 8px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(185,142,255,0.12);
  background: rgba(185,142,255,0.03);
  cursor: pointer;
  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.profile-card:hover {
  border-color: rgba(185,142,255,0.22);
  background: rgba(185,142,255,0.05);
}
.profile-card .pf-row {
  display: flex; align-items: center; gap: 10px;
}
.profile-card .pf-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(135deg, #e8b4c8, #d495ae);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  position: relative;
}
.profile-card .pf-avatar::before {
  content: '';
  position: absolute;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #fce4ec;
  top: 6px; left: 50%; transform: translateX(-50%);
}
.profile-card .pf-avatar::after {
  content: '';
  position: absolute;
  width: 18px; height: 11px;
  border-radius: 9px 9px 2px 2px;
  background: #fce4ec;
  bottom: 6px; left: 50%; transform: translateX(-50%);
}
.profile-card .pf-info { flex: 1; min-width: 0; }
.profile-card .pf-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-card .pf-tags {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px;
}
.profile-card .pf-tag {
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
}
.profile-card .pf-tag.mbti { color: #81c784; }
.profile-card .pf-tag.zodiac { color: #ffb74d; }
.profile-card .pf-tag.relation { color: var(--accent); }
.profile-card .pf-edit-icon {
  font-size: 12px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
.profile-card:hover .pf-edit-icon { opacity: 1; }

.profile-card-empty {
  margin: 8px 8px 4px 8px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px dashed rgba(255,255,255,0.06);
  font-size: 11px; color: var(--text-muted);
  text-align: center; cursor: pointer;
  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.profile-card-empty:hover {
  border-color: rgba(185,142,255,0.2);
  color: var(--title);
}

/* Profile Form Modal */
.profile-modal-overlay {

<script>
/* ========================================
   Utils
   ======================================== */
/** 过滤Markdown符号 + 规范化空行 */
function stripMarkdown(text) {
  if (!text) return text;
  return text
    .replace(/\*\*/g, '')
    .replace(/(?<!\*)\*(?!\*)/g, '')
    .replace(/^#+\s/gm, '')
    .replace(/\n{3,}/g, '\n\n');  // 3个以上连续换行压缩为2个
}

/* ========================================
   SettingsManager — API配置的读写
   ======================================== */
const SettingsManager = {
  DEFAULTS: {
    apiKey: '',
    baseURL: 'https://api.deepseek.com',
    model: 'deepseek-v4-flash',
    temperature: 0.7,
    agentName: '小暖',
  },

  _cache: null,

  /** 获取当前设置（含默认值fallback） */
  getAll() {
    if (this._cache) return this._cache;
    try {
      const raw = localStorage.getItem('emotion-agent:settings');
      if (raw) {
        this._cache = { ...this.DEFAULTS, ...JSON.parse(raw) };
      } else {
        this._cache = { ...this.DEFAULTS };
      }
    } catch (e) {
      console.error('[SettingsManager] 读取失败:', e);
      this._cache = { ...this.DEFAULTS };
    }
    return this._cache;
  },

  /** 更新单个设置项 */
  set(key, value) {
    const all = this.getAll();
    all[key] = value;
    this._save(all);
  },

  /** 批量更新设置 */
  update(partial) {
    const all = { ...this.getAll(), ...partial };
    this._save(all);
  },

  /** 验证API配置是否完整 */
  isValid() {
    const s = this.getAll();
    return !!s.apiKey && !!s.baseURL && !!s.model;
  },

  _save(all) {
    try {
      localStorage.setItem('emotion-agent:settings', JSON.stringify(all));
      this._cache = all;
    } catch (e) {
      console.error('[SettingsManager] 保存失败:', e);
      throw e;
    }
  },
};

/* ========================================
   StorageManager — 对话数据的读写与导出/导入
   ======================================== */
const StorageManager = {
  CHATS_KEY: 'emotion-agent:chats',

  /** 获取所有会话列表（按更新时间倒序） */
  getAllChats() {
    try {
      const raw = localStorage.getItem(this.CHATS_KEY);
      if (!raw) return [];
      return JSON.parse(raw);
    } catch (e) {
      console.error('[StorageManager] 读取会话失败:', e);
      return [];
    }
  },

  /** 保存全部会话 */
  saveAllChats(chats) {
    try {
      const json = JSON.stringify(chats);
      localStorage.setItem(this.CHATS_KEY, json);
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        throw new Error('STORAGE_FULL');
      }
      throw e;
    }
  },

  /** 获取单个会话 */
  getChat(chatId) {
    const chats = this.getAllChats();
    return chats.find(c => c.id === chatId) || null;
  },

  /** 保存/更新单个会话（存在则更新，不存在则追加） */
  saveChat(chat) {
    const chats = this.getAllChats();
    const idx = chats.findIndex(c => c.id === chat.id);
    chat.updatedAt = new Date().toISOString();
    if (idx >= 0) {
      chats[idx] = chat;
    } else {
      chats.unshift(chat);
    }
    this.saveAllChats(chats);
  },

  /** 删除单个会话 */
  deleteChat(chatId) {
    const chats = this.getAllChats().filter(c => c.id !== chatId);
    this.saveAllChats(chats);
  },

  /** 导出为JSON文件下载 */
  exportJSON() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      chats: this.getAllChats(),
      settings: SettingsManager.getAll(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const exportName = SettingsManager.getAll().agentName || '小暖';
    a.download = `${exportName}-对话备份-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  /** 从JSON文件导入，按ID去重合并 */
  importJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.version || !Array.isArray(data.chats)) {
            throw new Error('INVALID_FORMAT');
          }
          const existing = this.getAllChats();
          const existingIds = new Set(existing.map(c => c.id));
          const newChats = data.chats.filter(c => !existingIds.has(c.id));
          const merged = [...newChats, ...existing];
          this.saveAllChats(merged);
          if (data.settings) {
            SettingsManager.update(data.settings);
          }
          resolve(newChats.length);
        } catch (err) {
          reject(err.message === 'INVALID_FORMAT'
            ? new Error('文件格式不正确，请选择有效的对话备份文件')
            : err);
        }
      };
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsText(file);
    });
  },
};

/* ========================================
   SafetyGuard — 领域预检 + 危机检测
   ======================================== */
const SafetyGuard = {
  // 非情感领域关键词（命中则拒绝，0 token消耗）
  DOMAIN_BLOCK_LIST: [
    // 技术/编程
    '代码', '编程', 'bug', 'debug', '前端', '后端', '数据库', 'API', '服务器',
    'python', 'java', 'javascript', 'html', 'css', 'react', 'vue', 'node',
    '编译器', '算法', '数据结构', 'linux', 'windows', 'docker', 'git',
    '函数', '类', '对象', '数组', '字符串', '正则', '命令行',
    // 数学/科学
    '数学题', '方程式', '微积分', '物理', '化学', '生物', '几何',
    '证明', '定理', '概率', '统计',
    // 政治/宗教
    '政治', '选举', '党派', '政府', '宗教', '信仰', '教义',
    // 通用非情感
    '翻译', '写文章', '改写', '润色', '总结一下',
  ],

  // 情感领域关键词（白名单强化）
  DOMAIN_ALLOW_LIST: [
    '感情', '恋爱', '分手', '喜欢', '爱', '暗恋', '表白', '情侣', '伴侣',
    '婚姻', '夫妻', '吵架', '冷战', '矛盾', '冲突', '出轨', '劈腿', '前任',
    '沟通', '情绪', '心情', '难过', '伤心', '生气', '焦虑', '委屈', '失落',
    '朋友', '家人', '父母', '同事', '人际关系', '相处', '孤独', '寂寞',
    '暧昧', '相亲', '异地', '复合', '挽回', '放不下', '吃醋', '安全感',
    '婆媳', '闺蜜', '兄弟', '室友',
  ],

  /** 判断是否为情感领域问题。返回 { allowed: bool, reason: string } */
  checkDomain(userInput) {
    const text = userInput.toLowerCase();

    // 优先检查白名单 — 命中任何一个即放行
    for (const kw of this.DOMAIN_ALLOW_LIST) {
      if (text.includes(kw)) return { allowed: true, reason: '' };
    }

    // 检查黑名单
    for (const kw of this.DOMAIN_BLOCK_LIST) {
      if (text.includes(kw.toLowerCase())) {
        return {
          allowed: false,
          reason: '抱歉，我是情感沟通助手，只能帮你解答感情和人际关系方面的问题。如果有情感方面的困扰，随时找我聊聊。',
        };
      }
    }

    // 既不在白名单也不在黑名单 → 放行（可能是情感相关的开放式提问）
    return { allowed: true, reason: '' };
  },

  // 危机关键词 → 安全响应模式
  CRISIS_PATTERNS: [
    { keywords: ['自杀', '不想活', '结束生命', '自残', '自伤', '割腕', '跳楼', '安眠药'],
      response: '我听到你说的这些，非常担心你的安全。请你立即拨打**全国心理援助热线 400-161-9995**（24小时免费），有专业的心理咨询师可以帮助你。我只是一个AI助手，无法提供危机干预，但请你务必联系专业人士。你的生命非常宝贵。' },
    { keywords: ['家暴', '被打', '挨打', '虐待', '殴打'],
      response: '如果正在经历暴力，你的安全是第一位的。请拨打**全国妇联维权热线 12338**或**报警 110**寻求帮助。我建议你不要独自处理，联系信任的亲友或专业机构。' },
  ],

  /** 检查是否触发危机响应。返回危机响应文本，或 null 表示未触发 */
  checkCrisis(userInput) {
    for (const pattern of this.CRISIS_PATTERNS) {
      for (const kw of pattern.keywords) {
        if (userInput.includes(kw)) return pattern.response;
      }
    }
    return null;
  },
};

/* ========================================
   System Prompt（动态名称）
   ======================================== */
function getSystemPrompt(name) {
  return `你是"${name}"，一个会聊天、懂心理学的朋友。你帮人梳理感情上的弯弯绕绕——不是那种板着脸做咨询的，而是那种会递杯热茶然后说"来来来，跟我说说到底怎么回事"的人。

## 你的风格
- 先接住情绪，再聊问题。人家哭了先递纸巾，别上来就分析
- 多问少断——好的问题比好的答案更重要，帮对方自己想明白
- 建议要具体到能立刻用。别说"你要多沟通"，说"你可以这样开口：我最近有点...想跟你聊聊"
- 不站队不评判。你是帮人看清楚的，不是帮人骂对象的

## 语气
- 像朋友聊天，不像写论文。可以用"天哪""真的假的""哈哈"这类真实反应
- 俏皮但不轻浮，在对方真难过的时候别乱抖机灵
- 心理学概念用大白话讲："你看啊，这其实就是所谓的回避型依恋——说人话就是他一有压力就想躲"
- "我跟你说""你猜怎么着""说实话""有道理吗"这类口语随便用
- 不用每条都长篇大论。有时候一句"唉，这也太难了"就够了

## 回复风格（像真人，不像AI）
- 不要每次都套固定模板。有时候直接给建议，有时候先问回去，有时候讲个相似的例子，有时候就安慰几句——变化才是真人
- 不要列"第一第二第三"，不要"核心观点+深入分析+行动建议"这种三段式，太像AI报告了
- 偶尔用反问："你想想，如果换做是你朋友遇到这事，你会怎么劝她？"
- 偶尔分享感受型回应："天哪这个情况我听了都替你委屈"
- 偶尔可以只回一两句话，不需要每次都长篇大论
- 可以用"我之前遇到过一个类似的情况..."这种讲故事的方式
- 段落之间自然过渡，不要像切换PPT页面
- ⚠️ 禁止使用任何星号（*）、双星号（**）、井号（#）等Markdown语法。emoji可以偶尔点缀在句子中，但不要作为结构化的段落标题
- 段落之间最多空一行，不要连续空多行。段落内部不要频繁换行，让文字自然流动

## 领域边界
你只回答以下范围内的问题：恋爱关系、婚姻家庭、人际沟通、情绪管理、自我认知。
遇到范围外的问题，回复："抱歉，我是情感沟通助手，只能帮你解答感情和人际关系方面的问题。如果有情感方面的困扰，随时找我聊聊。"

## 安全规则
- 当用户表达自杀/自伤意念：表达深切关心 → 明确告知你是AI无法提供危机干预 → 提供全国心理援助热线 400-161-9995
- 涉及家暴/虐待：提供求助资源（110 / 12338），不建议自行处理
- 涉及心理疾病症状：明确你不是医生，建议就医
- 永远不要鼓励伤害自己或他人的行为`;
}

/* ========================================
   DeepSeekClient — LLM API通信（OpenAI兼容格式）
   ======================================== */
const DeepSeekClient = {
  /** 流式聊天（SSE） */
  async streamChat(messages, callbacks) {
    const { onChunk, onDone, onError } = callbacks;
    const settings = SettingsManager.getAll();

    if (!settings.apiKey) {
      onError(new Error('API Key 未设置，请按 Ctrl+, 打开设置'));
      return;
    }

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30s超时

    try {
      const response = await fetch(`${settings.baseURL}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${settings.apiKey}`,
        },
        body: JSON.stringify({
          model: settings.model,
          messages: messages,
          temperature: settings.temperature,
          stream: true,
        }),
        signal: controller.signal,
      });

      clearTimeout(timeoutId);

      if (!response.ok) {
        const err = new Error(`API 错误`);
        err.status = response.status;
        if (response.status === 401) err.userMessage = 'API Key 无效，请检查后重新输入';
        else if (response.status === 429) err.userMessage = '请求过于频繁，请稍后再试';
        else err.userMessage = `服务器错误 (${response.status})，请稍后重试`;
        throw err;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // 不完整的行留在buffer

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data: ')) continue;
          const data = trimmed.slice(6);
          if (data === '[DONE]') {
            onDone();
            return;
          }
          try {
            const json = JSON.parse(data);
            const content = json.choices?.[0]?.delta?.content;
            if (content) onChunk(content);
          } catch (e) {
            // 跳过解析失败的行（某些API可能返回非标准格式）
          }
        }
      }
      onDone();
    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') {
        onError(new Error('请求超时，请检查网络后重试'));
      } else if (!err.userMessage) {
        err.userMessage = '网络连接失败，请检查网络后重试';
      }
      onError(err);
    }
  },

  /** 非流式请求（用于上下文压缩） */
  async chat(messages) {
    const settings = SettingsManager.getAll();

    const response = await fetch(`${settings.baseURL}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${settings.apiKey}`,
      },
      body: JSON.stringify({
        model: settings.model,
        messages: messages,
        temperature: 0.3, // 压缩用低温度
        stream: false,
      }),
    });

    if (!response.ok) {
      throw new Error(`API 请求失败: ${response.status}`);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content || '';
  },
};

/* ========================================
   ContextCompressor — 超过20轮时压缩早期对话
   ======================================== */
const ContextCompressor = {
  MAX_ROUNDS: 20,  // 保留最近N轮完整内容
  // 一轮 = 一条user消息 + 一条assistant回复

  /** 判断是否需要压缩 */
  needsCompression(messages) {
    // messages不包含system prompt，只算user+assistant对数
    const rounds = Math.floor(messages.length / 2);
    return rounds > this.MAX_ROUNDS;
  },

  /** 构建压缩用的prompt */
  _buildCompressionPrompt(oldMessages) {
    const history = oldMessages
      .map(m => `${m.role === 'user' ? '用户' : SettingsManager.getAll().agentName}: ${m.content}`)
      .join('\n\n');
    return [
      { role: 'system', content: '你是一个对话摘要助手。请将以下情感咨询对话压缩为一段200字以内的中文摘要，保留：1)用户的核心困扰 2)已讨论过的主要方向 3)用户表达过的倾向或决定。只输出摘要文本，不加前缀。' },
      { role: 'user', content: `请压缩以下对话：\n\n${history}` },
    ];
  },

  /**
   * 压缩消息列表。
   * 返回 { messages: 压缩后的完整消息列表, summary: 摘要文本 }
   * messages已包含system prompt占位（由ChatManager拼接）
   */
  async compress(messages, existingSummary) {
    const rounds = Math.floor(messages.length / 2);
    if (rounds <= this.MAX_ROUNDS) {
      return { messages, summary: existingSummary };
    }

    // 超出部分
    const overflowCount = (rounds - this.MAX_ROUNDS) * 2; // 转换为消息条数
    const oldPart = messages.slice(0, overflowCount);
    const recentPart = messages.slice(overflowCount);

    // 调用API压缩
    let newSummary;
    try {
      const compressMessages = this._buildCompressionPrompt(oldPart);
      newSummary = await DeepSeekClient.chat(compressMessages);
    } catch (e) {
      // 压缩失败则截断（降级方案）
      console.warn('[ContextCompressor] 压缩失败，使用截断:', e);
      return {
        messages: recentPart,
        summary: existingSummary || '(早期对话因过长已省略)',
      };
    }

    // 合并旧摘要
    const combinedSummary = existingSummary
      ? `${existingSummary}；${newSummary}`
      : newSummary;

    return { messages: recentPart, summary: combinedSummary };
  },
};

/* ========================================
   ChatManager — 会话CRUD + 消息流控
   ======================================== */
const ChatManager = {
  _currentChatId: null,

  /** 创建新会话 */
  createChat() {
    const chat = {
      id: crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
      title: '新对话',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      messages: [],
      summary: null,
      subjectProfile: null,
    };
    StorageManager.saveChat(chat);
    this._currentChatId = chat.id;
    return chat;
  },

  /** 获取当前会话 */
  getCurrentChat() {
    if (!this._currentChatId) return null;
    return StorageManager.getChat(this._currentChatId);
  },

  /** 切换到指定会话 */
  switchChat(chatId) {
    const chat = StorageManager.getChat(chatId);
    if (chat) {
      this._currentChatId = chatId;
    }
    return chat;
  },

  /** 构建发送给API的消息列表 */
  async buildContext() {
    const chat = this.getCurrentChat();
    if (!chat) return [{ role: 'system', content: getSystemPrompt(SettingsManager.getAll().agentName) }];

    const history = chat.messages; // 不含system prompt

    // 判断是否需要压缩
    if (ContextCompressor.needsCompression(history)) {
      const result = await ContextCompressor.compress(history, chat.summary);
      chat.messages = result.messages;
      chat.summary = result.summary;
      StorageManager.saveChat(chat);
    }

    // 拼接：system prompt + summary提示 + 历史消息
    const context = [{ role: 'system', content: getSystemPrompt(SettingsManager.getAll().agentName) }];

    if (chat.summary) {
      context[0].content += `\n\n[历史背景：${chat.summary}]`;
    }

    // 注入对象画像
    if (chat.subjectProfile && chat.subjectProfile.name) {
      const p = chat.subjectProfile;
      let profileText = '\n\n[对象画像 — 请针对此画像进行个性化分析和建议]\n';
      if (p.name) profileText += `称呼：${p.name}`;
      if (p.mbti) profileText += ` | MBTI：${p.mbti}`;
      if (p.zodiac) profileText += ` | 星座：${p.zodiac}`;
      if (p.age) profileText += ` | 年龄：${p.age}`;
      if (p.relationship) profileText += `\n关系状态：${p.relationship}`;
      if (p.personality) profileText += `\n性格特点：${p.personality}`;
      if (p.notes) profileText += `\n补充说明：${p.notes}`;
      context[0].content += profileText;
    }

    return context.concat(chat.messages);
  },

  /** 更新当前会话的对象画像 */
  updateProfile(profileData) {
    const chat = this.getCurrentChat();
    if (!chat) return;
    chat.subjectProfile = profileData;
    StorageManager.saveChat(chat);
  },

  /** 发送用户消息并获取流式回复 */
  async sendMessage(userInput, uiCallbacks) {
    const { onUserMsg, onAgentChunk, onAgentDone, onError, onReject } = uiCallbacks;

    // 1. 领域预检
    const domainCheck = SafetyGuard.checkDomain(userInput);
    if (!domainCheck.allowed) {
      // 本地拒绝，渲染拒绝卡片（不计入消息历史）
      onReject(domainCheck.reason);
      return;
    }

    // 2. 危机检测
    const crisisResponse = SafetyGuard.checkCrisis(userInput);
    if (crisisResponse) {
      // 触发安全模式 — 同时添加用户消息和安全回复
      const chat = this._ensureChat();
      chat.messages.push(
        { role: 'user', content: userInput, timestamp: new Date().toISOString() },
        { role: 'assistant', content: crisisResponse, timestamp: new Date().toISOString() }
      );
      StorageManager.saveChat(chat);
      onAgentChunk(crisisResponse);
      onAgentDone();
      return;
    }

    // 3. 正常流程
    const chat = this._ensureChat();

    // 添加用户消息
    const userMsg = { role: 'user', content: userInput, timestamp: new Date().toISOString() };
    chat.messages.push(userMsg);
    onUserMsg(userMsg);

    // 自动标题：首条消息作为标题
    if (chat.messages.length === 1) {
      chat.title = userInput.length > 20 ? userInput.slice(0, 20) + '...' : userInput;
    }

    StorageManager.saveChat(chat);

    // 4. 构建上下文并发起请求
    const context = await this.buildContext();

    let fullResponse = '';
    DeepSeekClient.streamChat(context, {
      onChunk: (text) => {
        fullResponse += text;
        onAgentChunk(text);
      },
      onDone: () => {
        // 保存assistant消息
        const chat = this.getCurrentChat();
        if (chat) {
          chat.messages.push({
            role: 'assistant',
            content: stripMarkdown(fullResponse),
            timestamp: new Date().toISOString(),
          });
          StorageManager.saveChat(chat);
        }
        onAgentDone();
      },
      onError: (err) => {
        // 保存已接收的部分
        if (fullResponse) {
          const chat = this.getCurrentChat();
          if (chat) {
            chat.messages.push({
              role: 'assistant',
              content: stripMarkdown(fullResponse) + '\n\n[响应中断]',
              timestamp: new Date().toISOString(),
            });
            StorageManager.saveChat(chat);
          }
        }
        onError(err);
      },
    });
  },

  /** 重试最后一条消息（补全中断的响应） */
  async retryLast() {
    const chat = this.getCurrentChat();
    if (!chat || chat.messages.length < 2) return;

    const lastAssistant = chat.messages[chat.messages.length - 1];
    if (lastAssistant.role !== 'assistant') return;

    // 移除最后一条assistant消息，重新生成
    chat.messages.pop();
    StorageManager.saveChat(chat);

    // 重新调用sendMessage但跳过添加用户消息
    const context = await this.buildContext();
    let fullResponse = '';

    return new Promise((resolve, reject) => {
      DeepSeekClient.streamChat(context, {
        onChunk: (text) => {
          fullResponse += text;
          UIController.appendToLastBubble(text);
        },
        onDone: () => {
          const chat = this.getCurrentChat();
          if (chat) {
            chat.messages.push({
              role: 'assistant',
              content: stripMarkdown(fullResponse),
              timestamp: new Date().toISOString(),
            });
            StorageManager.saveChat(chat);
          }
          resolve(fullResponse);
        },
        onError: reject,
      });
    });
  },

  /** 确保存在当前会话（没有则新建） */
  _ensureChat() {
    let chat = this.getCurrentChat();
    if (!chat) {
      chat = this.createChat();
    }
    return chat;
  },
};

/* ========================================
   UIController — DOM渲染与交互
   ======================================== */
const UIController = {
  /* ---- DOM 引用 ---- */
  _dom: {},
  _streamingBubble: null,

  init() {
    this._dom = {
      sidebar: document.getElementById('sidebar'),
      chatList: document.getElementById('chatList'),
      chatMessages: document.getElementById('chatMessages'),
      chatTitle: document.getElementById('chatTitle'),
      chatInput: document.getElementById('chatInput'),
      emptyState: document.getElementById('emptyState'),
      btnNewChat: document.getElementById('btnNewChat'),
      btnSend: document.getElementById('btnSend'),
      btnSettings: document.getElementById('btnSettings'),
      btnClearAll: document.getElementById('btnClearAll'),
      settingsPanel: document.getElementById('settingsPanel'),
      settingsOverlay: document.getElementById('settingsOverlay'),
      toastContainer: document.getElementById('toastContainer'),
      profileArea: document.getElementById('profileArea'),
      mainArea: document.getElementById('mainArea'),
    };

    this._bindEvents();
    this._bindSettingsEvents();
    this._loadSettingsToForm();
    this._renderSidebar();
    this._loadLastChat();
    this._checkFirstRun();
  },

  /* ---- 事件绑定 ---- */
  _bindEvents() {
    this._dom.btnNewChat.addEventListener('click', () => this._newChat());
    this._dom.btnSend.addEventListener('click', () => this._send());
    this._dom.chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this._send();
      }
    });
    this._dom.chatInput.addEventListener('input', () => {
      this._dom.chatInput.style.height = 'auto';
      this._dom.chatInput.style.height = Math.min(this._dom.chatInput.scrollHeight, 120) + 'px';
    });
    this._dom.btnSettings.addEventListener('click', () => this._toggleSettings());
    this._dom.btnClearAll.addEventListener('click', () => this._clearAllChats());

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'n') {
        e.preventDefault();
        this._newChat();
      }
      if (e.ctrlKey && e.key === ',') {
        e.preventDefault();
        this._toggleSettings(true);
      }
      if (e.key === 'Escape' && this._dom.settingsPanel.classList.contains('open')) {
        this._toggleSettings(false);
      }
    });
  },

  /* ---- 侧边栏渲染 ---- */
  _renderSidebar() {
    const chats = StorageManager.getAllChats();
    const currentId = ChatManager._currentChatId;
    this._dom.chatList.innerHTML = '';

    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentId ? ' active' : '');
      item.dataset.chatId = chat.id;

      const icon = document.createElement('span');
      icon.className = 'chat-icon';
      icon.textContent = '💬';

      const title = document.createElement('span');
      title.className = 'chat-title';
      title.textContent = chat.title;

      const delBtn = document.createElement('button');
      delBtn.className = 'chat-delete';
      delBtn.textContent = '×';
      delBtn.title = '删除对话';

      item.appendChild(icon);
      item.appendChild(title);
      item.appendChild(delBtn);
      this._dom.chatList.appendChild(item);

      item.addEventListener('click', (e) => {
        if (e.target === delBtn) return;
        this._switchToChat(chat.id);
      });

      item.addEventListener('dblclick', (e) => {
        if (e.target === delBtn) return;
        this._renameChat(chat.id, title);
      });

      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        this._deleteChat(chat.id);
      });
    });
  },

  _loadLastChat() {
    const chats = StorageManager.getAllChats();
    if (chats.length > 0) {
      this._switchToChat(chats[0].id);
    } else {
      this._newChat();
    }
  },

  _newChat() {
    const chat = ChatManager.createChat();
    this._renderSidebar();
    this._renderProfileCard();
    this._renderMessages();
    this._dom.chatTitle.textContent = '新对话';
    this._dom.chatInput.focus();
  },

  _switchToChat(chatId) {
    ChatManager.switchChat(chatId);
    this._renderSidebar();
    this._renderProfileCard();
    this._renderMessages();
    const chat = ChatManager.getCurrentChat();
    if (chat) this._dom.chatTitle.textContent = chat.title;
  },

  _deleteChat(chatId) {
    StorageManager.deleteChat(chatId);
    if (ChatManager._currentChatId === chatId) {
      ChatManager._currentChatId = null;
      this._loadLastChat();
    } else {
      this._renderSidebar();
    }
  },

  _renameChat(chatId, titleEl) {
    const chat = StorageManager.getChat(chatId);
    if (!chat) return;

    const input = document.createElement('input');
    input.className = 'chat-rename-input';
    input.value = chat.title;
    input.addEventListener('blur', () => {
      const newTitle = input.value.trim() || chat.title;
      chat.title = newTitle;
      StorageManager.saveChat(chat);
      this._renderSidebar();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = chat.title; input.blur(); }
    });
    titleEl.replaceWith(input);
    input.focus();
    input.select();
  },

  _clearAllChats() {
    if (!confirm('确定要清除全部对话吗？此操作不可撤销。建议先导出备份。')) return;
    StorageManager.saveAllChats([]);
    ChatManager._currentChatId = null;
    this._renderSidebar();
    this._newChat();
  },

  /* ---- 对象画像 ---- */
  _renderProfileCard() {
    const chat = ChatManager.getCurrentChat();
    if (!chat) { this._dom.profileArea.innerHTML = ''; return; }

    const profile = chat.subjectProfile;
    if (!profile || !profile.name) {
      this._dom.profileArea.innerHTML = `
        <div class="profile-card-empty" id="profileEmpty">
          ＋ 添加对象画像
        </div>`;
      document.getElementById('profileEmpty').addEventListener('click', () => this._openProfileModal());
      return;
    }

    // 紧凑标签
    const tags = [];
    if (profile.relationship) tags.push(`<span class="pf-tag relation">${this._escapeHtml(profile.relationship)}</span>`);
    if (profile.mbti) tags.push(`<span class="pf-tag mbti">${this._escapeHtml(profile.mbti)}</span>`);
    if (profile.zodiac) tags.push(`<span class="pf-tag zodiac">${this._escapeHtml(profile.zodiac)}</span>`);
    if (profile.age) tags.push(`<span class="pf-tag">${this._escapeHtml(profile.age)}岁</span>`);
    if (profile.personality) tags.push(`<span class="pf-tag">${this._escapeHtml(profile.personality)}</span>`);

    this._dom.profileArea.innerHTML = `
      <div class="profile-card" id="profileCard">
        <div class="pf-row">
          <div class="pf-avatar"></div>
          <div class="pf-info">
            <div class="pf-name">${this._escapeHtml(profile.name)}</div>
            <div class="pf-tags">${tags.join('')}</div>
          </div>
          <span class="pf-edit-icon">✎</span>
        </div>
      </div>`;
    document.getElementById('profileCard').addEventListener('click', () => this._openProfileModal());
  },

  _openProfileModal() {
    const chat = ChatManager.getCurrentChat();
    const profile = chat?.subjectProfile || {};

    const overlay = document.createElement('div');
    overlay.className = 'profile-modal-overlay';
    overlay.id = 'profileModalOverlay';
    overlay.innerHTML = `
      <div class="profile-modal">
        <h3>${profile.name ? '编辑' : '新建'}对象画像</h3>
        <div class="settings-group">
          <label>称呼</label>
          <input class="pf-input" id="pfName" value="${this._escapeHtml(profile.name || '')}" placeholder="比如：小明、阿花、TA">
        </div>
        <div class="settings-group">
          <label>MBTI</label>
          <input class="pf-input" id="pfMbti" value="${this._escapeHtml(profile.mbti || '')}" placeholder="比如：INFP、ESTJ">
        </div>
        <div class="settings-group">
          <label>星座</label>
          <input class="pf-input" id="pfZodiac" value="${this._escapeHtml(profile.zodiac || '')}" placeholder="比如：双子座、天蝎座">
        </div>
        <div class="settings-group">
          <label>年龄</label>
          <input class="pf-input" id="pfAge" value="${this._escapeHtml(profile.age || '')}" placeholder="比如：25">
        </div>
        <div class="settings-group">
          <label>关系状态</label>
          <input class="pf-input" id="pfRelationship" value="${this._escapeHtml(profile.relationship || '')}" placeholder="比如：暗恋中、恋爱3个月、已婚">
        </div>
        <div class="settings-group">
          <label>性格特点</label>
          <input class="pf-input" id="pfPersonality" value="${this._escapeHtml(profile.personality || '')}" placeholder="比如：内向敏感、不善于表达">
        </div>
        <div class="settings-group">
          <label>补充说明</label>
          <textarea class="pf-input pf-textarea" id="pfNotes" placeholder="其他你希望助手了解的背景...">${this._escapeHtml(profile.notes || '')}</textarea>
        </div>
        <div class="profile-modal-actions">
          <button class="pf-btn-cancel" id="pfCancel">取消</button>
          <button class="pf-btn-save" id="pfSave">保存画像</button>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    const close = () => overlay.remove();
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.getElementById('pfCancel').addEventListener('click', close);
    document.getElementById('pfSave').addEventListener('click', () => {
      const data = {
        name: document.getElementById('pfName').value.trim(),
        mbti: document.getElementById('pfMbti').value.trim(),
        zodiac: document.getElementById('pfZodiac').value.trim(),
        age: document.getElementById('pfAge').value.trim(),
        relationship: document.getElementById('pfRelationship').value.trim(),
        personality: document.getElementById('pfPersonality').value.trim(),
        notes: document.getElementById('pfNotes').value.trim(),
      };
      if (!data.name) { this._showToast('请至少填写称呼', 'error'); return; }
      ChatManager.updateProfile(data);
      this._renderProfileCard();
      close();
      this._showToast('画像已保存，后续对话将自动引用', 'success');
    });
    document.getElementById('pfName').focus();
  },

  /* ---- 占位方法（Task 8 实现） ---- */
  _renderMessages() {
    const chat = ChatManager.getCurrentChat();
    this._dom.chatMessages.innerHTML = '';

    if (!chat || chat.messages.length === 0) {
      this._dom.emptyState.style.display = 'flex';
      this._dom.mainArea.classList.add('is-empty');
      return;
    }

    this._dom.emptyState.style.display = 'none';
    this._dom.mainArea.classList.remove('is-empty');
    const fragment = document.createDocumentFragment();

    chat.messages.forEach((msg, idx) => {
      if (msg.role === 'user') {
        fragment.appendChild(this._createUserBubble(msg));
      } else if (msg.role === 'assistant') {
        fragment.appendChild(this._createAgentBubble(msg, idx === chat.messages.length - 1 && msg.content.includes('[响应中断]')));
      }
    });

    this._dom.chatMessages.appendChild(fragment);
    this._scrollToBottom();
  },

  _createUserBubble(msg) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-avatar"></div>
      <div class="msg-content">
        <div class="msg-bubble">${this._escapeHtml(this._stripMarkdown(msg.content))}</div>
        <div class="msg-time">${this._formatTime(msg.timestamp)}</div>
      </div>`;
    return row;
  },

  _createAgentBubble(msg, wasInterrupted) {
    const row = document.createElement('div');
    row.className = 'msg-row agent';
    row.innerHTML = `
      <div class="msg-avatar">👧🏻</div>
      <div class="msg-content">
        <div class="msg-bubble">${this._escapeHtml(this._stripMarkdown(msg.content))}</div>
        <div class="msg-time">${this._formatTime(msg.timestamp)}</div>
        ${wasInterrupted ? '<span class="continue-hint" data-action="continue">点击继续生成 →</span>' : ''}
      </div>`;

    const continueBtn = row.querySelector('[data-action="continue"]');
    if (continueBtn) {
      continueBtn.addEventListener('click', () => this._continueResponse());
    }
    return row;
  },

  _createRejectCard(message) {
    const card = document.createElement('div');
    card.className = 'reject-card';
    card.textContent = message;
    return card;
  },

  _createTypingIndicator() {
    const name = SettingsManager.getAll().agentName || '小暖';
    const row = document.createElement('div');
    row.className = 'msg-row agent thinking';
    row.id = 'typingIndicator';
    row.innerHTML = `
      <div class="msg-avatar">👧🏻</div>
      <div class="msg-content">
        <div class="msg-bubble">
          <span class="thinking-label">${this._escapeHtml(name)}正在思考</span>
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
          <span class="thinking-dot"></span>
        </div>
      </div>`;
    return row;
  },
  _send() {
    const text = this._dom.chatInput.value.trim();
    if (!text) return;

    this._dom.btnSend.disabled = true;
    this._dom.chatInput.value = '';
    this._dom.chatInput.style.height = 'auto';

    this._dom.emptyState.style.display = 'none';
    this._dom.mainArea.classList.remove('is-empty');

    const typing = this._createTypingIndicator();
    this._dom.chatMessages.appendChild(typing);
    this._scrollToBottom();

    ChatManager.sendMessage(text, {
      onUserMsg: (msg) => {
        // 保留思考动画，用户气泡和思考同屏显示
        const bubble = this._createUserBubble(msg);
        this._dom.chatMessages.insertBefore(bubble, typing);
        this._scrollToBottom();
        this._renderSidebar();
        this._dom.chatTitle.textContent = ChatManager.getCurrentChat()?.title || '新对话';
      },
      onAgentChunk: (chunk) => {
        if (!this._streamingBubble) {
          // 第一个chunk到达，移除思考动画
          typing.remove();
          const row = document.createElement('div');
          row.className = 'msg-row agent';
          row.innerHTML = `
            <div class="msg-avatar">👧🏻</div>
            <div class="msg-content">
              <div class="msg-bubble streaming"></div>
            </div>`;
          this._streamingBubble = row.querySelector('.msg-bubble');
          this._dom.chatMessages.appendChild(row);
        }
        this._streamingBubble.textContent += this._stripMarkdown(chunk);
        this._scrollToBottom();
      },
      onAgentDone: () => {
        if (this._streamingBubble) {
          this._streamingBubble.classList.remove('streaming');
        }
        this._streamingBubble = null;
        this._dom.btnSend.disabled = false;
        this._dom.chatInput.focus();
        this._renderMessages();
      },
      onError: (err) => {
        typing.remove();
        this._streamingBubble = null;
        this._dom.btnSend.disabled = false;

        const row = document.createElement('div');
        row.className = 'msg-row agent error';
        row.innerHTML = `
          <div class="msg-avatar">👧🏻</div>
          <div class="msg-content">
            <div class="msg-bubble">${this._escapeHtml(err.userMessage || err.message)}</div>
            <div class="msg-actions">
              <button class="retry-btn" data-action="retry">重新发送</button>
            </div>
          </div>`;
        const retryBtn = row.querySelector('[data-action="retry"]');
        retryBtn.addEventListener('click', () => {
          row.remove();
          this._dom.chatInput.value = text;
          this._send();
        });
        this._dom.chatMessages.appendChild(row);
        this._scrollToBottom();
      },
      onReject: (message) => {
        typing.remove();
        this._dom.btnSend.disabled = false;
        this._dom.chatInput.focus();
        const card = this._createRejectCard(message);
        this._dom.chatMessages.appendChild(card);
        this._scrollToBottom();
      },
    });
  },

  appendToLastBubble(text) {
    const bubbles = this._dom.chatMessages.querySelectorAll('.msg-row.agent .msg-bubble');
    const last = bubbles[bubbles.length - 1];
    if (last) {
      last.textContent += text;
      this._scrollToBottom();
    }
  },

  _continueResponse() {
    const chat = ChatManager.getCurrentChat();
    if (!chat || chat.messages.length === 0) return;

    const last = chat.messages[chat.messages.length - 1];
    if (last.role === 'assistant') {
      last.content = last.content.replace(/\n\n\[响应中断\]$/, '');
      StorageManager.saveChat(chat);
    }

    this._dom.btnSend.disabled = true;
    const typing = this._createTypingIndicator();
    this._dom.chatMessages.appendChild(typing);

    ChatManager.retryLast().then(() => {
      typing.remove();
      this._dom.btnSend.disabled = false;
      this._renderMessages();
    }).catch((err) => {
      typing.remove();
      this._dom.btnSend.disabled = false;
      this._showToast(err.userMessage || err.message, 'error');
    });
  },

  _scrollToBottom() {
    requestAnimationFrame(() => {
      this._dom.chatMessages.scrollTop = this._dom.chatMessages.scrollHeight;
    });
  },

  _escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  },

  /** 过滤Markdown符号：移除** * # 等 */
  _stripMarkdown(text) {
    return stripMarkdown(text);
  },

  _formatTime(isoString) {
    if (!isoString) return '';
    const d = new Date(isoString);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  },
  _toggleSettings(force) {
    const isOpen = this._dom.settingsPanel.classList.contains('open');
    const shouldOpen = force !== undefined ? force : !isOpen;
    if (shouldOpen) {
      this._loadSettingsToForm();
      this._dom.settingsPanel.classList.add('open');
      this._dom.settingsOverlay.classList.add('open');
    } else {
      this._dom.settingsPanel.classList.remove('open');
      this._dom.settingsOverlay.classList.remove('open');
    }
  },

  _bindSettingsEvents() {
    this._dom.btnCloseSettings = document.getElementById('btnCloseSettings');
    this._dom.btnExport = document.getElementById('btnExport');
    this._dom.btnImport = document.getElementById('btnImport');
    this._dom.btnClearData = document.getElementById('btnClearData');
    this._dom.importFileInput = document.getElementById('importFileInput');

    this._dom.btnCloseSettings.addEventListener('click', () => this._toggleSettings(false));
    this._dom.settingsOverlay.addEventListener('click', () => this._toggleSettings(false));

    this._dom.btnExport.addEventListener('click', () => {
      StorageManager.exportJSON();
      this._showToast('备份已下载', 'success');
    });

    this._dom.btnImport.addEventListener('click', () => {
      this._dom.importFileInput.click();
    });
    this._dom.importFileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const count = await StorageManager.importJSON(file);
        this._showToast(`成功导入 ${count} 个新会话`, 'success');
        this._renderSidebar();
        this._loadLastChat();
      } catch (err) {
        this._showToast(err.message, 'error');
      }
      this._dom.importFileInput.value = '';
    });

    this._dom.btnClearData.addEventListener('click', () => {
      if (!confirm('确定要清除所有数据吗？此操作不可撤销。建议先导出备份。')) return;
      localStorage.clear();
      ChatManager._currentChatId = null;
      this._renderSidebar();
      this._newChat();
      this._loadSettingsToForm();
      this._showToast('所有数据已清除', 'info');
    });

    ['settingApiKey', 'settingBaseURL', 'settingTemperature'].forEach(id => {
      const el = document.getElementById(id);
      const key = id === 'settingApiKey' ? 'apiKey'
        : id === 'settingBaseURL' ? 'baseURL'
        : 'temperature';
      el.addEventListener('change', () => {
        let value = el.value;
        if (id === 'settingTemperature') {
          const raw = parseFloat(el.value);
          value = !isNaN(raw) ? raw : 0.7;
        }
        SettingsManager.set(key, value);
        this._updateApiStatus();
      });
    });

    document.getElementById('settingModel').addEventListener('change', (e) => {
      SettingsManager.set('model', e.target.value);
      this._updateApiStatus();
    });

    // 助手昵称
    document.getElementById('settingAgentName').addEventListener('change', (e) => {
      const name = e.target.value.trim() || '小暖';
      SettingsManager.set('agentName', name);
      this._updateBranding();
    });
  },

  _loadSettingsToForm() {
    const s = SettingsManager.getAll();
    document.getElementById('settingAgentName').value = s.agentName || '小暖';
    document.getElementById('settingApiKey').value = s.apiKey || '';
    document.getElementById('settingBaseURL').value = s.baseURL || '';
    document.getElementById('settingModel').value = s.model || 'deepseek-v4-flash';
    document.getElementById('settingTemperature').value = s.temperature ?? 0.7;
    this._updateApiStatus();
    this._updateBranding();
  },

  _updateBranding() {
    const name = SettingsManager.getAll().agentName || '小暖';
    document.getElementById('sidebarLogoName').textContent = name;
    document.title = `${name} — 情感沟通助手`;
  },

  _updateApiStatus() {
    const el = document.getElementById('apiStatus');
    if (SettingsManager.isValid()) {
      el.innerHTML = '<span class="status-badge ok">● API 已配置</span>';
    } else {
      el.innerHTML = '<span class="status-badge warn">○ API 未配置 — 请填入 Key</span>';
    }
  },

  /* ---- 辅助方法 ---- */
  _showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    this._dom.toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  },

  _checkFirstRun() {
    if (!SettingsManager.isValid()) {
      setTimeout(() => {
        const name = SettingsManager.getAll().agentName || '小暖';
        this._showToast(`欢迎使用${name}！请先配置 API Key`, 'info');
        this._toggleSettings(true);
      }, 500);
    }
  },
};

/* ========================================
   INIT — 页面加载入口（后续任务填充）
   ======================================== */
document.addEventListener('DOMContentLoaded', () => {
  UIController.init();
});

/* ========================================
   Global Error Handler
   ======================================== */
window.onerror = (msg, url, line, col, error) => {
  console.error('[小暖] 未捕获错误:', msg, 'at', line, ':', col);
  const toast = document.createElement('div');
  toast.className = 'toast error';
  toast.textContent = '出了点问题，刷新页面即可恢复';
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
  return true;
};

window.addEventListener('unhandledrejection', (e) => {
  console.error('[小暖] 未处理的Promise拒绝:', e.reason);
  const toast = document.createElement('div');
  toast.className = 'toast error';
  toast.textContent = '出了点问题，刷新页面即可恢复';
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
});
</script>

</body>
</html>
