<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小心</title>
<style>
/* ========================================
   CSS Reset & Variables
   ======================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08090d;
  --title: #b98eff;
  --accent: #e85d75;
  --text: #f6f2e8;
  --text-dim: #aaa59a;
  --text-muted: #746f66;
  --card-bg: rgba(255,255,255,0.03);
  --card-border: rgba(255,255,255,0.06);
  --font: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
  --sidebar-width: 260px;
  --settings-width: 340px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.6;
}

/* 背景纹理 */
body::before {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.025;
  pointer-events: none;
  z-index: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px),
    repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.03) 50px);
}

/* ========================================
   Layout Shell
   ======================================== */
#app {
  position: relative;
  width: 100%; height: 100%;
  display: flex;
  z-index: 1;
}

/* ========================================
   Scrollbar
   ======================================== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

/* ========================================
   Buttons & Inputs (base)
   ======================================== */
button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  outline: none;
}

input, textarea {
  font-family: inherit;
  outline: none;
  border: none;
}

/* ========================================
   Toast
   ======================================== */
.toast-container {
  position: fixed; top: 20px; right: 20px;
  z-index: 999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--text);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  max-width: 360px;
}
.toast.error { background: rgba(232,93,117,0.15); border: 1px solid rgba(232,93,117,0.25); }
.toast.success { background: rgba(76,175,80,0.12); border: 1px solid rgba(76,175,80,0.2); }
.toast.info { background: rgba(185,142,255,0.1); border: 1px solid rgba(185,142,255,0.18); }

@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* ========================================
   Animations
   ======================================== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ========================================
   Sidebar
   ======================================== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 100%;
  background: rgba(255,255,255,0.015);
  border-right: 1px solid var(--card-border);
  display: flex;
  flex-direction: column;
  z-index: 10;
}

.sidebar-header {
  padding: 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--card-border);
}
.sidebar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700;
  color: var(--title);
}
.sidebar-logo .logo-icon { font-size: 24px; }
.sidebar-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: rgba(185,142,255,0.1);
  color: var(--title);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.sidebar-btn:hover { background: rgba(185,142,255,0.2); }

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.chat-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
  position: relative;
  margin-bottom: 2px;
}
.chat-item:hover { background: rgba(255,255,255,0.04); }
.chat-item.active { background: rgba(185,142,255,0.08); color: var(--text); }
.chat-item .chat-icon { font-size: 14px; flex-shrink: 0; opacity: 0.6; }
.chat-item .chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chat-item .chat-delete {
  opacity: 0;
  width: 24px; height: 24px;
  border-radius: 4px;
  background: transparent;
  color: var(--text-muted);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.chat-item:hover .chat-delete { opacity: 1; }
.chat-item .chat-delete:hover { background: rgba(232,93,117,0.15); color: var(--accent); }
.chat-item .chat-rename-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--title);
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  padding: 2px 6px;
}

.sidebar-footer {
  padding: 10px 12px;
  border-top: 1px solid var(--card-border);
}
.sidebar-footer-btn {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
  transition: all 0.15s;
}
.sidebar-footer-btn:hover { background: rgba(232,93,117,0.08); color: var(--accent); }

/* ========================================
   Main Chat Area
   ======================================== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0;
  position: relative;
}
.main-area.is-empty {
  justify-content: center;
  align-items: center;
}
.main-area.is-empty .chat-header-bar {
  position: absolute; top: 0; left: 0; right: 0;
  z-index: 5;
}
.main-area.is-empty .chat-messages {
  flex: 0 0 auto;
  width: 600px;
  max-width: calc(100% - 40px);
}
.main-area.is-empty .empty-state {
  padding: 0 0 20px 0;
}
.main-area.is-empty .chat-input-area {
  max-width: 600px;
  width: calc(100% - 40px);
  margin: 0;
  border-top: none;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  background: rgba(255,255,255,0.02);
}

.chat-header-bar {
  padding: 12px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.chat-header-title { font-size: 15px; font-weight: 600; color: var(--text); }
.chat-header-actions { display: flex; gap: 8px; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
  transition: max-width 0.45s cubic-bezier(.22,1,.36,1),
              width 0.45s cubic-bezier(.22,1,.36,1),
              flex 0.45s cubic-bezier(.22,1,.36,1);
}

.empty-state {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-muted);
  gap: 12px;
  transition: opacity 0.3s ease;
}
.empty-state[style*="display: none"] { opacity: 0; }
.empty-icon { font-size: 56px; opacity: 0.4; transition: opacity 0.3s ease; }
.empty-text { font-size: 15px; }
.empty-hint { font-size: 12px; opacity: 0.6; }

.chat-input-area {
  padding: 14px 20px;
  border-top: 1px solid var(--card-border);
  display: flex; align-items: flex-end; gap: 10px;
  flex-shrink: 0;
  transition: max-width 0.45s cubic-bezier(.22,1,.36,1),
              border-radius 0.45s cubic-bezier(.22,1,.36,1),
              background 0.45s ease,
              border-color 0.45s ease,
              margin 0.45s cubic-bezier(.22,1,.36,1);
}
.chat-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  resize: none;
  max-height: 120px;
  min-height: 20px;
  line-height: 1.5;
  transition: height 0.15s ease, border-color 0.25s ease;
}
.chat-input:focus { border-color: var(--title); }
.chat-input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 40px; height: 40px;
  min-width: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--title), #9b6fff);
  color: white;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.25s ease, transform 0.25s ease, background 0.25s ease;
}
.send-btn:hover { opacity: 0.85; transform: scale(1.05); }
.send-btn:disabled { opacity: 0.35; cursor: default; transform: scale(0.95); }

/* 图片上传按钮 */
.img-btn {
  width: 40px; height: 40px;
  min-width: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  color: var(--text-dim);
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.25s ease, color 0.25s ease, transform 0.25s ease;
}
.img-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); transform: scale(1.05); }
.img-btn.has-image { background: rgba(185,142,255,0.15); color: var(--title); }

/* 图片预览区域（输入框上方） */
.img-preview-area {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 8px 0;
}
.img-preview {
  position: relative;
  width: 64px; height: 64px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--card-border);
  flex-shrink: 0;
}
.img-preview img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.img-preview .img-remove {
  position: absolute; top: 2px; right: 2px;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.7);
  color: #fff;
  font-size: 12px;
  line-height: 20px;
  text-align: center;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.2s;
}
.img-preview:hover .img-remove { opacity: 1; }
.img-remove:hover { background: var(--accent); }

/* 用户气泡中的图片标识 */
.msg-bubble .img-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; margin-bottom: 6px;
  border-radius: 12px;
  background: rgba(185,142,255,0.12);
  color: var(--title);
  font-size: 13px;
}

/* ========================================
   Message Bubbles
   ======================================== */
.msg-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: msgIn 0.45s cubic-bezier(.22,1,.36,1) both;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(16px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
.msg-row.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.msg-row.user .msg-avatar {
  width: 40px; height: 40px;
  font-size: 22px;
  background: linear-gradient(135deg, #d4b8e8, #b98eff);
  display: flex; align-items: center; justify-content: center;
}
.msg-row.agent .msg-avatar {
  width: 36px; height: 36px;
  font-size: 18px;
  background: linear-gradient(135deg, #d4a0ff, #f28b9f);
}

/* 内容包裹层 — 防止flex撑开 */
.msg-content {
  flex: 0 1 auto;
  min-width: 0;
  max-width: calc(100% - 52px);
}

.msg-bubble {
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}
.msg-row.user .msg-bubble {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  color: var(--text);
}
.msg-row.agent .msg-bubble {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  color: var(--text);
}

/* streaming 光标 */
.msg-row.agent .msg-bubble.streaming::after {
  content: ' ▌';
  animation: blink 0.8s infinite;
  color: var(--title);
}

/* 分段回复的连续气泡 — 紧凑间距，保留头像 */
.msg-row.agent.consecutive {
  margin-top: 2px;
}

.msg-time {
  font-size: 10px;
  color: var(--text-muted);
  margin-top: 3px;
  padding: 0 4px;
}
.msg-row.user .msg-time { text-align: right; }

/* Reject card */
.reject-card {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid rgba(232,93,117,0.2);
  background: rgba(232,93,117,0.05);
  color: var(--accent);
  font-size: 13px;
  line-height: 1.6;
  animation: msgIn 0.45s cubic-bezier(.22,1,.36,1) both;
}

/* Error bubble */
.msg-row.error .msg-bubble {
  border: 1px solid rgba(232,93,117,0.3) !important;
}
.msg-actions {
  display: flex; gap: 8px; margin-top: 6px;
}
.retry-btn {
  padding: 4px 12px;
  border-radius: 6px;
  background: rgba(232,93,117,0.1);
  color: var(--accent);
  font-size: 12px;
  transition: background 0.15s;
}
.retry-btn:hover { background: rgba(232,93,117,0.2); }

/* Typing indicator — 思考动画 */
#typingIndicator .msg-content {
  flex: none; max-width: none; width: auto;
}
#typingIndicator .msg-bubble {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px;
  border-radius: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: none; -webkit-backdrop-filter: none;
  font-size: 11px; color: var(--text-dim);
}
#typingIndicator .msg-bubble > * {
  display: contents;
}
#typingIndicator .thinking-label {
  font-size: 11px;
  color: var(--text-dim);
  background: linear-gradient(90deg, var(--text-dim) 0%, var(--title) 50%, var(--text-dim) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
#typingIndicator .thinking-dot {
  display: inline-block;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--title);
  animation: thinkingBounce 1.2s infinite ease-in-out;
}
#typingIndicator .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
#typingIndicator .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes thinkingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* 思考时头像微动 */
.msg-row.agent.thinking {
  gap: 6px;
}
.msg-row.agent.thinking .msg-avatar {
  width: 22px; height: 22px;
  font-size: 11px;
  animation: avatarPulse 2s ease-in-out infinite;
}
@keyframes avatarPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}

/* "继续"按钮（中断补全） */
.continue-hint {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  margin-top: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.04);
  color: var(--text-muted);
  font-size: 11px;
  cursor: pointer;
}
.continue-hint:hover { color: var(--title); }
/* ========================================
   Settings Panel
   ======================================== */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 50;
  display: none;
}
.settings-overlay.open { display: block; }

.settings-panel {
  position: fixed;
  top: 0; right: 0;
  width: var(--settings-width);
  height: 100%;
  background: var(--bg);
  border-left: 1px solid var(--card-border);
  z-index: 51;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.22,1,.36,1);
}
.settings-panel.open { transform: translateX(0); }

.settings-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--card-border);
  display: flex; align-items: center; justify-content: space-between;
}
.settings-header h3 { font-size: 16px; color: var(--title); font-weight: 600; }
.close-btn {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: transparent;
  color: var(--text-dim);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.close-btn:hover { background: rgba(255,255,255,0.06); }

.settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 18px;
}
.settings-group { display: flex; flex-direction: column; gap: 6px; }
.settings-group label {
  font-size: 12px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.settings-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
}
.settings-input:focus { border-color: var(--title); }
.settings-input::placeholder { color: var(--text-muted); }

.settings-select {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.settings-select option { background: #1a1a2e; color: var(--text); }

.settings-hint {
  font-size: 11px; color: var(--text-muted); line-height: 1.5;
}

.settings-divider {
  height: 1px;
  background: var(--card-border);
  margin: 4px 0;
}

.settings-actions {
  display: flex; gap: 10px;
}
.btn-primary {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: rgba(185,142,255,0.15);
  color: var(--title);
  font-size: 13px;
  font-weight: 600;
  transition: background 0.15s;
}
.btn-primary:hover { background: rgba(185,142,255,0.25); }
.btn-danger {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  background: rgba(232,93,117,0.08);
  color: var(--accent);
  font-size: 13px;
  transition: background 0.15s;
}
.btn-danger:hover { background: rgba(232,93,117,0.18); }

.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 12px;
}
.status-badge.ok { background: rgba(76,175,80,0.1); color: #81c784; }
.status-badge.warn { background: rgba(255,152,0,0.1); color: #ffb74d; }

.file-input-hidden { display: none; }

/* ========================================
   Profile Card — 侧边栏紧凑卡片
   ======================================== */
.profile-area { flex-shrink: 0; }
.profile-card {
  margin: 8px 8px 4px 8px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(185,142,255,0.12);
  background: rgba(185,142,255,0.03);
  cursor: pointer;
  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.profile-card:hover {
  border-color: rgba(185,142,255,0.22);
  background: rgba(185,142,255,0.05);
}
.profile-card .pf-row {
  display: flex; align-items: center; gap: 10px;
}
.profile-card .pf-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(135deg, #d4b8e8, #b98eff);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.profile-card .pf-info { flex: 1; min-width: 0; }
.profile-card .pf-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.profile-card .pf-tags {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px;
}
.profile-card .pf-tag {
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 10px;
  background: rgba(255,255,255,0.04);
  color: var(--text-dim);
}
.profile-card .pf-tag.mbti { color: #81c784; }
.profile-card .pf-tag.zodiac { color: #ffb74d; }
.profile-card .pf-tag.relation { color: var(--accent); }
.profile-card .pf-edit-icon {
  font-size: 12px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
.profile-card:hover .pf-edit-icon { opacity: 1; }

.profile-card-empty {
  margin: 8px 8px 4px 8px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px dashed rgba(255,255,255,0.06);
  font-size: 11px; color: var(--text-muted);

  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.profile-card-empty:hover {
  border-color: rgba(185,142,255,0.2);

}

/* Profile Form Modal */
.profile-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.profile-modal {
  width: 460px; max-height: 80vh;
  background: #111118;
  border: 1px solid var(--card-border);
  border-radius: 14px;
  padding: 24px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 14px;

.profile-modal h3 { font-size: 16px; color: var(--title); margin-bottom: 4px; }
.profile-modal .settings-group { gap: 4px; }
.profile-modal .settings-group label { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; }
.profile-modal .pf-input {
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);

.profile-modal .pf-input:focus { border-color: var(--title); outline: none; }

  resize: vertical; min-height: 50px;
}

  display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px;
}
.pf-btn-cancel {
  padding: 8px 16px; border-radius: 8px;
  background: transparent; color: var(--text-dim);
  font-size: 13px; cursor: pointer;
}

/* ========================================
   User Profile Card — 侧边栏我的画像
   ======================================== */
.user-profile-area { flex-shrink: 0; }
.user-profile-card {
  margin: 0 8px 4px 8px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.user-profile-card:hover {
  border-color: rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
}
.user-profile-card .pf-row {
  display: flex; align-items: center; gap: 10px;
}
.user-profile-card .pf-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  background: linear-gradient(135deg, #d4b8e8, #b98eff);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.user-profile-card .pf-info { flex: 1; min-width: 0; }
.user-profile-card .pf-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-profile-card .pf-sub {
  font-size: 10px; color: var(--text-muted);
  margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-profile-card .pf-edit-icon {
  font-size: 12px; color: var(--text-muted);
  opacity: 0; transition: opacity 0.15s;
  flex-shrink: 0;
}
.user-profile-card:hover .pf-edit-icon { opacity: 1; }

.user-profile-card-empty {
  margin: 0 8px 4px 8px;
  padding: 8px 12px;
  border-radius: 10px;
  border: 1px dashed rgba(255,255,255,0.06);
  font-size: 11px; color: var(--text-muted);
  text-align: center; cursor: pointer;
  transition: all 0.15s;
  animation: slideIn 0.25s ease;
}
.user-profile-card-empty:hover {
  border-color: rgba(255,255,255,0.15);
  color: #ccc;
}

/* User memory facts list in modal */

  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 12px;
}
.user-facts-section .facts-header {

}
.user-facts-section .fact-item {
  display: flex; align-items: center; gap: 6px;

  border-radius: 6px;
  font-size: 12px; color: var(--text-dim);
  transition: background 0.15s;
}
.user-facts-section .fact-item:hover { background: rgba(255,255,255,0.03); }
.user-facts-section .fact-item .fact-text {
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.user-facts-section .fact-item .fact-del {

  border-radius: 4px;
  background: transparent; color: var(--text-muted);
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  opacity: 0; transition: all 0.15s;
}
.user-facts-section .fact-item:hover .fact-del { opacity: 1; }
.user-facts-section .fact-item .fact-del:hover {
  background: rgba(232,93,117,0.12);
  color: var(--accent);
}
.user-facts-section .facts-empty {
  font-size: 11px; color: var(--text-muted);
  font-style: italic;
  padding: 4px 6px;
}
.pf-btn-cancel:hover { color: var(--text); }
.pf-btn-save {
  padding: 8px 20px; border-radius: 8px;
  background: rgba(185,142,255,0.15); color: var(--title);
  font-size: 13px; font-weight: 600; cursor: pointer;
}

/* OCR 识别中提示 */
.ocr-status {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  color: var(--title);
  font-size: 13px;
  animation: msgIn 0.3s ease both;
}
.ocr-status .ocr-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(185,142,255,0.2);
  border-top-color: var(--title);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.ocr-status.done { color: #4caf50; }
.ocr-status.error { color: var(--accent); }
</style>
</head>

<script>
/* ========================================
   Utils
   ======================================== */
/** 过滤Markdown符号 + 规范化空行 */
function stripMarkdown(text) {
  if (!text) return text;
  return text
    .replace(/\*\*/g, '')
    .replace(/(?<!\*)\*(?!\*)/g, '')
    .replace(/^#+\s/gm, '')
    .replace(/\n{3,}/g, '\n\n');  // 3个以上连续换行压缩为2个
}

/* ========================================
   SettingsManager — API配置的读写
   ======================================== */
const SettingsManager = {
  DEFAULTS: {
    apiKey: '',
    baseURL: 'https://api.deepseek.com',
    model: 'deepseek-v4-pro',
    temperature: 0.7,
    agentName: '小心',
  },

  _cache: null,

  /** 获取当前设置（含默认值fallback） */
  getAll() {
    if (this._cache) return this._cache;
    try {
      const raw = localStorage.getItem('emotion-agent:settings');
      if (raw) {
        this._cache = { ...this.DEFAULTS, ...JSON.parse(raw) };
        // 迁移旧模型名
        if (this._cache.model === 'deepseek-v4-flash' || this._cache.model === 'deepseek-v4-pro[1M]') {
          this._cache.model = this.DEFAULTS.model;
          this._save(this._cache);
        }
      } else {
        this._cache = { ...this.DEFAULTS };
      }
    } catch (e) {
      console.error('[SettingsManager] 读取失败:', e);
      this._cache = { ...this.DEFAULTS };
    }
    return this._cache;
  },

  /** 更新单个设置项 */
  set(key, value) {
    const all = this.getAll();
    all[key] = value;
    this._save(all);
  },

  /** 批量更新设置 */
  update(partial) {
    const all = { ...this.getAll(), ...partial };
    this._save(all);
  },

  /** 验证API配置是否完整 */
  isValid() {
    const s = this.getAll();
    return !!s.apiKey && !!s.baseURL && !!s.model;
  },

  _save(all) {
    try {
      localStorage.setItem('emotion-agent:settings', JSON.stringify(all));
      this._cache = all;
    } catch (e) {
      console.error('[SettingsManager] 保存失败:', e);
      throw e;
    }
  },
};

/* ========================================
   StorageManager — 对话数据的读写与导出/导入
   ======================================== */
const StorageManager = {
  CHATS_KEY: 'emotion-agent:chats',
  USER_MEMORY_KEY: 'emotion-agent:user-memory',

  /** 获取所有会话列表（按更新时间倒序） */
  getAllChats() {
    try {
      const raw = localStorage.getItem(this.CHATS_KEY);
      if (!raw) return [];
      return JSON.parse(raw);
    } catch (e) {
      console.error('[StorageManager] 读取会话失败:', e);
      return [];
    }
  },

  /** 保存全部会话 */
  saveAllChats(chats) {
    try {
      const json = JSON.stringify(chats);
      localStorage.setItem(this.CHATS_KEY, json);
    } catch (e) {
      if (e.name === 'QuotaExceededError') {
        throw new Error('STORAGE_FULL');
      }
      throw e;
    }
  },

  /** 获取单个会话 */
  getChat(chatId) {
    const chats = this.getAllChats();
    return chats.find(c => c.id === chatId) || null;
  },

  /** 保存/更新单个会话（存在则更新，不存在则追加） */
  saveChat(chat) {
    const chats = this.getAllChats();
    const idx = chats.findIndex(c => c.id === chat.id);
    chat.updatedAt = new Date().toISOString();
    if (idx >= 0) {
      chats[idx] = chat;
    } else {
      chats.unshift(chat);
    }
    this.saveAllChats(chats);
  },

  /** 删除单个会话 */
  deleteChat(chatId) {
    const chats = this.getAllChats().filter(c => c.id !== chatId);
    this.saveAllChats(chats);
  },

  /** 导出为JSON文件下载 */
  exportJSON() {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      chats: this.getAllChats(),
      settings: SettingsManager.getAll(),
      userMemory: this.getUserMemory(),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const exportName = SettingsManager.getAll().agentName || '小心';
    a.download = `${exportName}-对话备份-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  },

  /** 从JSON文件导入，按ID去重合并 */
  importJSON(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.version || !Array.isArray(data.chats)) {
            throw new Error('INVALID_FORMAT');
          }
          const existing = this.getAllChats();
          const existingIds = new Set(existing.map(c => c.id));
          const newChats = data.chats.filter(c => !existingIds.has(c.id));
          const merged = [...newChats, ...existing];
          this.saveAllChats(merged);
          if (data.settings) {
            SettingsManager.update(data.settings);
          }
          if (data.userMemory && data.userMemory.facts) {
            // 导入用户记忆，与现有记忆合并
            UserMemoryManager.mergeFacts(data.userMemory.facts || []);
            if (data.userMemory.name) {
              const existing = UserMemoryManager.get();
              if (!existing.name) {
                UserMemoryManager.updateProfile({
                  name: data.userMemory.name,
                  mbti: data.userMemory.mbti || '',
                  zodiac: data.userMemory.zodiac || '',
                  age: data.userMemory.age || '',
                  personality: data.userMemory.personality || '',
                  notes: data.userMemory.notes || '',
                });
              }
            }
          }
          resolve(newChats.length);
        } catch (err) {
          reject(err.message === 'INVALID_FORMAT'
            ? new Error('文件格式不正确，请选择有效的对话备份文件')
            : err);
        }
      };
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsText(file);
    });
  },

  /** 获取用户记忆（全局单例） */
  getUserMemory() {
    try {
      const raw = localStorage.getItem(this.USER_MEMORY_KEY);
      return raw ? JSON.parse(raw) : {
        name: '',
        mbti: '',
        zodiac: '',
        age: '',
        personality: '',
        notes: '',
        facts: [],
        lastExtractedAt: null,
      };
    } catch (e) {
      console.error('[StorageManager] 读取用户记忆失败:', e);
      return { name: '', mbti: '', zodiac: '', age: '', personality: '', notes: '', facts: [], lastExtractedAt: null };
    }
  },

  /** 保存用户记忆 */
  saveUserMemory(memory) {
    try {
      localStorage.setItem(this.USER_MEMORY_KEY, JSON.stringify(memory));
    } catch (e) {
      if (e.name === 'QuotaExceededError') throw new Error('STORAGE_FULL');
      throw e;
    }
  },
};

/* ========================================
   UserMemoryManager — 用户记忆提取与管理
   ======================================== */
const UserMemoryManager = {
  /** 获取当前用户记忆 */
  get() {
    return StorageManager.getUserMemory();
  },

  /** 保存用户记忆 */
  save(memory) {
    StorageManager.saveUserMemory(memory);
  },

  /** 更新用户填写的画像字段 */
  updateProfile(data) {
    const memory = this.get();
    memory.name = data.name || '';
    memory.mbti = data.mbti || '';
    memory.zodiac = data.zodiac || '';
    memory.age = data.age || '';
    memory.personality = data.personality || '';
    memory.notes = data.notes || '';
    this.save(memory);
  },

  /** 合并新提取的事实（按 content 去重） */
  mergeFacts(newFacts) {
    const memory = this.get();
    const existingContents = new Set(memory.facts.map(f => f.content));
    const added = [];
    newFacts.forEach(f => {
      if (!existingContents.has(f.content)) {
        f.id = crypto.randomUUID ? crypto.randomUUID() : 'fact-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
        f.timestamp = new Date().toISOString();
        f.source = f.source || 'extracted';
        memory.facts.push(f);
        added.push(f);
      }
    });
    // 最多保留 30 条，旧的在前
    if (memory.facts.length > 30) {
      memory.facts = memory.facts.slice(-30);
    }
    if (added.length > 0) {
      memory.lastExtractedAt = new Date().toISOString();
      this.save(memory);
    }
    return added.length;
  },

  /** 删除单条事实 */
  deleteFact(factId) {
    const memory = this.get();
    memory.facts = memory.facts.filter(f => f.id !== factId);
    this.save(memory);
  },

  /** 构建用于注入 System Prompt 的用户记忆文本 */
  buildContextInjection() {
    const m = this.get();
    const hasProfile = m.name || m.mbti || m.zodiac || m.personality;
    const hasFacts = m.facts.length > 0;
    if (!hasProfile && !hasFacts) return '';

    let text = '\n\n[你对这位朋友的了解：]\n';

    // 自然语言画像
    const parts = [];
    if (m.name) parts.push(m.name);
    if (m.age) parts.push(m.age + '岁');
    if (m.zodiac) parts.push(m.zodiac);
    if (m.mbti) parts.push(m.mbti);
    if (m.personality) parts.push('自述性格：' + m.personality);

    if (parts.length > 0) {
      text += parts.join('，') + '。\n';
    }

    if (m.notes) {
      text += 'TA说过：' + m.notes + '\n';
    }

    if (hasFacts) {
      text += '\n你从聊天中了解到：';
      m.facts.forEach(f => {
        text += '\n- ' + f.content;
      });
      text += '\n';
    }

    text += '自然地运用这些了解——该提的时候提一句"你上次不是说..."，别像背档案一样全抖出来。';

    return text;
  },

  /** 构建事实提取 prompt */
  buildExtractionPrompt(chatMessages) {
    // 只取用户消息用于提取
    const userMessages = chatMessages.filter(m => m.role === 'user').map(m => m.content);
    const recentMsgs = userMessages.slice(-10).join('\n---\n');

    return '你是一个用户画像提取器。从以下对话中提取关于"用户自己"的关键事实。\n\n只提取用户明确透露的关于自己的信息，比如：\n- 依恋风格（焦虑型/回避型/安全型）\n- 重要经历（分手时间、感情历史）\n- 性格特征（敏感、容易焦虑、不擅表达）\n- 感情需求（需要安全感、害怕冲突）\n- 行为模式（一吵架就冷战、习惯性忍让）\n\n不要提取关于"对方/对象"的信息——那些属于对象画像。\n\n输出格式：每行一条事实，用 "- " 开头。每条事实简洁明确，不超过20个字。\n如果没有发现新事实，输出 "无"。\n\n对话内容：\n---\n' + recentMsgs + '\n---\n\n用户关键事实：';
  },

  /** 异步提取事实 */
  async extractFacts(chatId) {
    const settings = SettingsManager.getAll();
    if (!settings.apiKey) return; // 没有 API key 就跳过

    const chat = StorageManager.getChat(chatId);
    if (!chat || chat.messages.length === 0) return;

    const prompt = this.buildExtractionPrompt(chat.messages);

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);

      const response = await fetch(settings.baseURL + '/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + settings.apiKey,
        },
        body: JSON.stringify({
          model: settings.model,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.3,
          max_tokens: 500,
          stream: false,
        }),
        signal: controller.signal,
      });

      clearTimeout(timeoutId);

      if (!response.ok) return;

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content || '';

      // 解析提取结果
      const facts = [];
      const lines = content.split('\n');
      lines.forEach(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
          const fact = trimmed.replace(/^[-•]\s*/, '').trim();
          if (fact && fact !== '无' && fact.length <= 50) {
            facts.push({ content: fact, category: 'extracted', source: chatId, confidence: 'medium' });
          }
        }
      });

      if (facts.length > 0) {
        this.mergeFacts(facts);
      }
    } catch (_) {
      // 提取失败静默忽略，不影响主流程
    }
  },
};

/* ========================================
   DeepSeekClient — LLM API通信（OpenAI兼容格式）
   ======================================== */
const DeepSeekClient = {
  /** 流式聊天（SSE） */
  async streamChat(messages, callbacks) {
    const { onChunk, onDone, onError } = callbacks;
    const settings = SettingsManager.getAll();

    if (!settings.apiKey) {
      onError(new Error('API Key 未设置，请按 Ctrl+, 打开设置'));
      return;
    }

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000); // 30s超时

    try {
      const response = await fetch(`${settings.baseURL}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${settings.apiKey}`,
        },
        body: JSON.stringify({
          model: settings.model,
          messages: messages,
          temperature: settings.temperature,
          stream: true,
        }),
        signal: controller.signal,
      });

      clearTimeout(timeoutId);

      if (!response.ok) {
        const err = new Error(`API 错误`);
        err.status = response.status;
        if (response.status === 401) err.userMessage = 'API Key 无效，请检查后重新输入';
        else if (response.status === 429) err.userMessage = '请求过于频繁，请稍后再试';
        else err.userMessage = `服务器错误 (${response.status})，请稍后重试`;
        throw err;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || ''; // 不完整的行留在buffer

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data: ')) continue;
          const data = trimmed.slice(6);
          if (data === '[DONE]') {
            onDone();
            return;
          }
          try {
            const json = JSON.parse(data);
            const content = json.choices?.[0]?.delta?.content;
            if (content) onChunk(content);
          } catch (e) {
            // 跳过解析失败的行（某些API可能返回非标准格式）
          }
        }
      }
      onDone();
    } catch (err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') {
        onError(new Error('请求超时，请检查网络后重试'));
      } else if (!err.userMessage) {
        err.userMessage = '网络连接失败，请检查网络后重试';
      }
      onError(err);
    }
  },

  /** 非流式请求（用于上下文压缩） */
  async chat(messages) {
    const settings = SettingsManager.getAll();

    const response = await fetch(`${settings.baseURL}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${settings.apiKey}`,
      },
      body: JSON.stringify({
        model: settings.model,
        messages: messages,
        temperature: 0.3, // 压缩用低温度
        stream: false,
      }),
    });

    if (!response.ok) {
      throw new Error(`API 请求失败: ${response.status}`);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content || '';
  },
};

/* ========================================
   ContextCompressor — 超过20轮时压缩早期对话
   ======================================== */
const ContextCompressor = {
  MAX_ROUNDS: 20,  // 保留最近N轮完整内容
  // 一轮 = 一条user消息 + 一条assistant回复

  /** 判断是否需要压缩 */
  needsCompression(messages) {
    // messages不包含system prompt，只算user+assistant对数
    const rounds = Math.floor(messages.length / 2);
    return rounds > this.MAX_ROUNDS;
  },

  /** 构建压缩用的prompt */
  _buildCompressionPrompt(oldMessages) {
    const history = oldMessages
      .map(m => `${m.role === 'user' ? '用户' : SettingsManager.getAll().agentName}: ${m.content}`)
      .join('\n\n');
    return [
      { role: 'system', content: '你是一个对话摘要助手。请将以下情感咨询对话压缩为一段200字以内的中文摘要，保留：1)用户的核心困扰 2)已讨论过的主要方向 3)用户表达过的倾向或决定。只输出摘要文本，不加前缀。' },
      { role: 'user', content: `请压缩以下对话：\n\n${history}` },
    ];
  },

  /**
   * 压缩消息列表。
   * 返回 { messages: 压缩后的完整消息列表, summary: 摘要文本 }
   * messages已包含system prompt占位（由ChatManager拼接）
   */
  async compress(messages, existingSummary) {
    const rounds = Math.floor(messages.length / 2);
    if (rounds <= this.MAX_ROUNDS) {
      return { messages, summary: existingSummary };
    }

    // 超出部分
    const overflowCount = (rounds - this.MAX_ROUNDS) * 2; // 转换为消息条数
    const oldPart = messages.slice(0, overflowCount);
    const recentPart = messages.slice(overflowCount);

    // 调用API压缩
    let newSummary;
    try {
      const compressMessages = this._buildCompressionPrompt(oldPart);
      newSummary = await DeepSeekClient.chat(compressMessages);
    } catch (e) {
      // 压缩失败则截断（降级方案）
      console.warn('[ContextCompressor] 压缩失败，使用截断:', e);
      return {
        messages: recentPart,
        summary: existingSummary || '(早期对话因过长已省略)',
      };
    }

    // 合并旧摘要
    const combinedSummary = existingSummary
      ? `${existingSummary}；${newSummary}`
      : newSummary;

    return { messages: recentPart, summary: combinedSummary };
  },
};

/* ========================================
   ImageUtils — 客户端图片压缩
   ======================================== */
const ImageUtils = {
  /**
   * 将图片文件压缩为base64 data URL
   * @param {File} file - 图片文件
   * @param {number} maxDim - 长边最大像素（默认1024）
   * @param {number} quality - JPEG质量 0-1（默认0.75）
   * @returns {Promise<string>} base64 data URL
   */
  async compress(file, maxDim = 1024, quality = 0.75) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          // 仅当超出时才缩放
          if (width > maxDim || height > maxDim) {
            const ratio = maxDim / Math.max(width, height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => reject(new Error('图片加载失败'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('文件读取失败'));
      reader.readAsDataURL(file);
    });
  },

  /**
   * 使用 Tesseract.js 对图片进行 OCR 文字识别
   * @param {string} dataUrl - base64 图片
   * @param {function} onProgress - 进度回调 (progress 0-100)
   * @returns {Promise<string>} 识别出的文字
   */
  /**
   * 使用 OCR.space 免费 API 进行文字识别
   * @param {string} dataUrl - base64 图片
   * @param {function} onProgress - 进度回调 (progress 0-100)
   * @returns {Promise<string>} 识别出的文字
   */
  async ocr(dataUrl, onProgress) {
    const settings = SettingsManager.getAll();
    const apiKey = settings.ocrApiKey || '';
    if (!apiKey) throw new Error('OCR API Key 未设置，请在设置面板中填入 OCR.space 的 API Key');

    if (onProgress) onProgress(30);

    // 去掉 data:image/...;base64, 前缀，OCR.space 需要纯 base64
    const base64 = dataUrl.replace(/^data:image/\w+;base64,/, '');

    const formData = new FormData();
    formData.append('base64Image', 'data:image/jpeg;base64,' + base64);
    formData.append('language', 'chs');
    formData.append('isOverlayRequired', 'false');
    formData.append('OCREngine', '2'); // Engine 2 中文更好

    if (onProgress) onProgress(60);

    const response = await fetch('https://api.ocr.space/parse/image', {
      method: 'POST',
      headers: { 'apikey': apiKey },
      body: formData,
    });

    if (!response.ok) {
      throw new Error('OCR API 请求失败 (' + response.status + ')');
    }

    const result = await response.json();
    if (onProgress) onProgress(100);

    if (result.IsErroredOnProcessing) {
      throw new Error('OCR 识别失败: ' + (result.ErrorMessage || '未知错误'));
    }

    // 提取所有识别到的文字
    const texts = (result.ParsedResults || [])
      .map(r => r.ParsedText || '')
      .filter(t => t);
    return texts.join('\n').trim();
  },
};

/* ========================================
   ChatManager — 会话CRUD + 消息流控
   ======================================== */
const ChatManager = {
  _currentChatId: null,

  /** 创建新会话 */
  createChat() {
    const chat = {
      id: crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
      title: '新对话',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      messages: [],
      summary: null,
      subjectProfile: null,
    };
    StorageManager.saveChat(chat);
    this._currentChatId = chat.id;
    return chat;
  },

  /** 获取当前会话 */
  getCurrentChat() {
    if (!this._currentChatId) return null;
    return StorageManager.getChat(this._currentChatId);
  },

  /** 切换到指定会话 */
  switchChat(chatId) {
    const chat = StorageManager.getChat(chatId);
    if (chat) {
      this._currentChatId = chatId;
    }
    return chat;
  },

  /** 构建发送给API的消息列表 */
  async buildContext() {
    const chat = this.getCurrentChat();
    if (!chat) return [{ role: 'system', content: getSystemPrompt(SettingsManager.getAll().agentName) }];

    const history = chat.messages; // 不含system prompt

    // 判断是否需要压缩
    if (ContextCompressor.needsCompression(history)) {
      const result = await ContextCompressor.compress(history, chat.summary);
      chat.messages = result.messages;
      chat.summary = result.summary;
      StorageManager.saveChat(chat);
    }

    // 拼接：system prompt + summary提示 + 历史消息
    const context = [{ role: 'system', content: getSystemPrompt(SettingsManager.getAll().agentName) }];

    if (chat.summary) {
      context[0].content += `\n\n[历史背景：${chat.summary}]`;
    }

    // 注入用户记忆（全局持久，先于对象画像）
    const userMemoryText = UserMemoryManager.buildContextInjection();
    if (userMemoryText) {
      context[0].content += userMemoryText;
    }

    // 注入对象画像 — 人格适应：模型必须以适配对方人格的方式沟通
    if (chat.subjectProfile && chat.subjectProfile.name) {
      const p = chat.subjectProfile;
      const mbti = (p.mbti || '').toUpperCase();

      let profileText = '\n\n---\n';
      profileText += '[对象画像 — 以下信息用于帮你理解"' + p.name + '"，给出精准的分析和沟通建议。你保持损友嘴替的风格跟用户说话，画像只影响分析内容，不影响你的表达风格]\n\n';

      // 基本信息
      profileText += p.name + '的基本信息：\n';
      profileText += '称呼：' + p.name;
      if (p.relationship) profileText += '，与用户的关系：' + p.relationship;
      if (p.age) profileText += '，年龄：' + p.age + '岁';
      profileText += '\n';
      if (p.mbti) profileText += 'MBTI：' + p.mbti + '\n';
      if (p.zodiac) profileText += '星座：' + p.zodiac + '\n';
      if (p.personality) profileText += '性格描述：' + p.personality + '\n';
      if (p.notes) profileText += '补充背景：' + p.notes + '\n';

      profileText += '\n[分析指南 — 用以下框架理解' + p.name + '，帮用户看清问题、找到沟通方法]\n\n';

      // MBTI 四维度分析 — 解释对象的行为模式 + 给用户的沟通策略
      if (p.mbti) {
        profileText += p.name + '是' + p.mbti + '，你在分析时要运用以下认知：\n';

        if (mbti.includes('I')) {
          profileText += '• 内向(I)：' + p.name + '通过独处恢复能量。TA沉默、不回应时，很可能是在内部处理信息，不是拒绝用户。教用户给TA留出思考和消化的空间，文字沟通可能比当面沟通更让TA舒服。\n';
        } else if (mbti.includes('E')) {
          profileText += '• 外向(E)：' + p.name + '通过交流整理想法。TA的"话多"是思考方式，不是啰嗦。教用户多听TA说、在对话中帮TA自己理清，不要急着打断或给结论。\n';
        }

        if (mbti.includes('S')) {
          profileText += '• 实感(S)：' + p.name + '关注具体事实和实际体验，不擅处理抽象的情感分析。TA更在意"你做了什么"而非"你感受如何"。教用户用行动表达关心（做顿饭、陪TA办事），少说"我感觉…"多说"上次你做了X，我很感动"。\n';
        } else if (mbti.includes('N')) {
          profileText += '• 直觉(N)：' + p.name + '喜欢探讨深层意义和未来可能性，日常琐事可能让TA觉得无聊。教用户和TA聊聊未来规划、梦想、共同成长这类有高度的话题，比聊今天吃什么更能让TA投入。\n';
        }

        if (mbti.includes('T')) {
          profileText += '• 思考(T)：' + p.name + '用逻辑做决定，看重"有没有道理"而非"有没有人情味"。用户抱怨TA不够共情时，帮用户理解——TA不是不在乎，TA表达关心的方式是帮你分析问题、给解决方案。教用户跟TA沟通时直接说事实和诉求，用"我希望你帮我…"替代"你从来都不理解我"。\n';
        } else if (mbti.includes('F')) {
          profileText += '• 情感(F)：' + p.name + '需要先被理解再谈问题，对批评和冲突敏感。教用户在提意见前先表达理解和关心——"我知道你可能是好意…我只是有点…"——用"我感受"而非"你做错了"的方式。\n';
        }

        if (mbti.includes('J')) {
          profileText += '• 判断(J)：' + p.name + '需要计划、结论和确定性，悬而未决让TA焦虑。教用户沟通时给出明确态度和方向——"我想跟你确认一下我们…"——避免模糊表态让TA胡思乱想。\n';
        } else if (mbti.includes('P')) {
          profileText += '• 感知(P)：' + p.name + '喜欢灵活开放，讨厌被催被逼。教用户给TA多个选项让TA自己选，而不是替TA做决定或催TA表态。说"你想什么时候聊聊都行，我等你"比"你到底想怎样"有效得多。\n';
        }

        profileText += '\n';
      }

      // 性格描述 → 给用户的具体沟通策略
      if (p.personality) {
        profileText += '根据性格描述"' + p.personality + '"，帮用户理解' + p.name + '的行为动机和应对方法：\n';
        const pers = p.personality;
        if (pers.includes('内向') || pers.includes('敏感') || pers.includes('文静') || pers.includes('安静')) {
          profileText += '→ ' + p.name + '偏内向敏感。帮用户理解TA的沉默或回避往往不是拒绝，而是需要安全感。建议用户用温和的方式主动靠近，创造轻松无压力的氛围。\n';
        }
        if (pers.includes('开朗') || pers.includes('外向') || pers.includes('活泼') || pers.includes('热情')) {
          profileText += '→ ' + p.name + '偏开朗外向。TA可能通过社交获取能量，用户需要理解TA的朋友圈不是"比你重要"而是TA的生活方式。建议用户参与TA的社交而非限制TA。\n';
        }
        if (pers.includes('理性') || pers.includes('务实') || pers.includes('冷静') || pers.includes('理智')) {
          profileText += '→ ' + p.name + '偏理性务实。TA可能不擅长回应情绪化的表达，不是冷漠而是不知道该怎么接。教用户用直接、有条理的方式表达诉求——"我希望我们每周能单独待一个晚上"比"你都不陪我"有效。\n';
        }
        if (pers.includes('感性') || pers.includes('浪漫') || pers.includes('温柔') || pers.includes('细腻')) {
          profileText += '→ ' + p.name + '偏感性细腻。TA对细节和情绪很敏感，用户的随口一句话可能被TA琢磨很久。教用户注意表达方式，多肯定TA的感受。\n';
        }
        if (pers.includes('固执') || pers.includes('强势') || pers.includes('倔') || pers.includes('强硬')) {
          profileText += '→ ' + p.name + '有主见不轻易妥协。告诉用户不要硬碰硬，用"我理解你的想法…同时我想说…"的方式，先认可再表达，别让TA觉得被挑战。\n';
        }
        if (pers.includes('不善于表达') || pers.includes('不善表达') || pers.includes('闷') || pers.includes('沉默')) {
          profileText += '→ ' + p.name + '不擅长表达。帮用户理解TA的"什么都没说"不代表"什么都没想"。教用户用开放式问题引导——"今天有什么开心的事吗？"而非"你怎么又不说话"。\n';
        }
        profileText += '\n';
      }

      // 星座提示
      if (p.zodiac) {
        profileText += p.name + '的星座是' + p.zodiac + '，分析时可适当结合星座的性格倾向（如沟通偏好、情绪模式），但不要过度依赖星座刻板印象，要结合具体情境灵活判断。\n\n';
      }

      profileText += '核心：你保持损友嘴替的风格跟用户说话，emoji该怎么用怎么用。但你的分析内容要精准地建立在' + p.name + '的画像之上——帮用户理解"TA为什么这样"、"我该怎么跟TA沟通"。画像决定的是你给出的建议，不是你说话的语气。\n';

      context[0].content += profileText;
    }

    // 注入场景描述（动态开场白引导）
    {
      const now = new Date();
      const hour = now.getHours();
      let timeDesc;
      if (hour < 6) timeDesc = '凌晨';
      else if (hour < 9) timeDesc = '早上';
      else if (hour < 12) timeDesc = '上午';
      else if (hour < 14) timeDesc = '中午';
      else if (hour < 18) timeDesc = '下午';
      else if (hour < 22) timeDesc = '晚上';
      else timeDesc = '深夜';

      const historyMsgs = chat.messages;
      const isNewConversation = historyMsgs.length === 0;
      const lastMsgTime = historyMsgs.length > 0
        ? new Date(historyMsgs[historyMsgs.length - 1].timestamp).getTime()
        : null;
      const hoursSinceLastMsg = lastMsgTime
        ? (now.getTime() - lastMsgTime) / (1000 * 60 * 60)
        : Infinity;

      let sceneText = '\n\n[场景：';
      if (isNewConversation) {
        sceneText += '新对话，' + timeDesc + '。轻松自然地开始，不用刻意问候。';
      } else if (hoursSinceLastMsg > 6) {
        sceneText += timeDesc + '，用户刚回来，上次聊是' + Math.round(hoursSinceLastMsg) + '小时前。随口问一句之前聊的事怎么样了，别长篇。';
      } else if (hoursSinceLastMsg > 2) {
        sceneText += timeDesc + '。自然地回应，不用刻意打招呼。';
      } else {
        sceneText += '对话持续中，直接回应，不用说开场白。';
      }
      sceneText += ']';
      context[0].content += sceneText;
    }

    return context.concat(chat.messages);
  },

  /** 更新当前会话的对象画像 */
  updateProfile(profileData) {
    const chat = this.getCurrentChat();
    if (!chat) return;
    chat.subjectProfile = profileData;
    StorageManager.saveChat(chat);
  },

  /** 智能分段：第一段独立（快速反应），其余合并，最多3段 */
  _splitResponse(text) {
    text = text.trim();
    if (!text) return [''];

    // 按空行（段落）拆分
    let segments = text.split(/\n{2,}/).map(s => s.trim()).filter(s => s);

    // 如果没拆出多段，尝试按单换行拆分
    if (segments.length === 1 && segments[0].length > 80) {
      const lines = segments[0].split(/\n/).map(s => s.trim()).filter(s => s);
      if (lines.length > 1) segments = lines;
    }

    const totalLen = segments.reduce((sum, s) => sum + s.length, 0);

    // 只有一段或整体很短 → 不拆分
    if (segments.length <= 1 || totalLen < 150) {
      console.log('[Split] 1段（' + totalLen + '字）');
      return [text];
    }

    // 第一段独立（快速反应），剩余的合并
    const first = segments[0];
    const rest = segments.slice(1);
    const restText = rest.join('\n\n');

    if (restText.length <= 250) {
      // 剩余部分不长 → 合并为1段，共2段
      console.log('[Split] 2段: ' + first.length + '字, ' + restText.length + '字');
      return [first, restText];
    }

    // 剩余部分较长 → 在段落边界均分为2段，共3段
    const mid = Math.ceil(rest.length / 2);
    const part1 = rest.slice(0, mid).join('\n\n');
    const part2 = rest.slice(mid).join('\n\n');
    console.log('[Split] 3段: ' + first.length + '字, ' + part1.length + '字, ' + part2.length + '字');
    return [first, part1, part2];
  },

  /** 发送用户消息并获取流式回复（前端按段落自动拆分气泡） */
  async sendMessage(userInput, uiCallbacks) {
    const { onUserMsg, onAgentChunk, onAgentDone, onError, onReject } = uiCallbacks;

    // 1. 领域预检
    const domainCheck = SafetyGuard.checkDomain(userInput);
    if (!domainCheck.allowed) {
      onReject(domainCheck.reason);
      return;
    }

    // 2. 危机检测
    const crisisResponse = SafetyGuard.checkCrisis(userInput);
    if (crisisResponse) {
      const chat = this._ensureChat();
      chat.messages.push(
        { role: 'user', content: userInput, timestamp: new Date().toISOString() },
        { role: 'assistant', content: crisisResponse, timestamp: new Date().toISOString() }
      );
      StorageManager.saveChat(chat);
      onAgentChunk(crisisResponse);
      onAgentDone();
      return;
    }

    // 3. 保存用户消息
    const chat = this._ensureChat();
    const userMsg = { role: 'user', content: userInput, timestamp: new Date().toISOString() };
    chat.messages.push(userMsg);
    onUserMsg(userMsg);
    if (chat.messages.length === 1) {
      chat.title = userInput.length > 20 ? userInput.slice(0, 20) + '...' : userInput;
    }
    StorageManager.saveChat(chat);

    // 4. 流式请求
    const context = await this.buildContext();

    let fullResponse = '';

    DeepSeekClient.streamChat(context, {
      onChunk: (text) => {
        fullResponse += text;
        onAgentChunk(text);
      },
      onDone: () => {
        // 按段落拆分为多个气泡
        const segments = this._splitResponse(fullResponse);
        const chat = this.getCurrentChat();
        if (chat) {
          segments.forEach(seg => {
            chat.messages.push({
              role: 'assistant',
              content: stripMarkdown(seg),
              timestamp: new Date().toISOString(),
            });
          });
          StorageManager.saveChat(chat);
        }
        // 记忆提取
        const userMsgCount = chat.messages.filter(m => m.role === 'user').length;
        if (userMsgCount >= 5) {
          const memory = UserMemoryManager.get();
          const lastExtracted = memory.lastExtractedAt ? new Date(memory.lastExtractedAt) : null;
          const elapsed = lastExtracted ? (Date.now() - lastExtracted.getTime()) : Infinity;
          if (elapsed > 10 * 60 * 1000) {
            setTimeout(() => {
              UserMemoryManager.extractFacts(chat.id).then(() => {
                UIController._renderUserProfileCard();
              });
            }, 2000);
          }
        }
        onAgentDone();
      },
      onError: (err) => {
        if (fullResponse) {
          const chat = this.getCurrentChat();
          if (chat) {
            const segments = this._splitResponse(fullResponse);
            if (segments.length > 0) {
              segments[segments.length - 1] = segments[segments.length - 1] + '\n\n[响应中断]';
            }
            segments.forEach(seg => {
              chat.messages.push({
                role: 'assistant',
                content: stripMarkdown(seg),
                timestamp: new Date().toISOString(),
              });
            });
            StorageManager.saveChat(chat);
          }
        }
        onError(err);
      },
    });
  },

  /** 重试最后一条消息（补全中断的响应） */
  async retryLast() {
    const chat = this.getCurrentChat();
    if (!chat || chat.messages.length < 2) return;

    const lastAssistant = chat.messages[chat.messages.length - 1];
    if (lastAssistant.role !== 'assistant') return;

    // 移除最后一条assistant消息，重新生成
    chat.messages.pop();
    StorageManager.saveChat(chat);

    // 重新调用sendMessage但跳过添加用户消息
    const context = await this.buildContext();
    let fullResponse = '';

    return new Promise((resolve, reject) => {
      DeepSeekClient.streamChat(context, {
        onChunk: (text) => {
          fullResponse += text;
          UIController.appendToLastBubble(text);
        },
        onDone: () => {
          const chat = this.getCurrentChat();
          if (chat) {
            chat.messages.push({
              role: 'assistant',
              content: stripMarkdown(fullResponse),
              timestamp: new Date().toISOString(),
            });
            StorageManager.saveChat(chat);
          }
          resolve(fullResponse);
        },
        onError: reject,
      });
    });
  },

  /** 确保存在当前会话（没有则新建） */
  _ensureChat() {
    let chat = this.getCurrentChat();
    if (!chat) {
      chat = this.createChat();
    }
    return chat;
  },
};

/* ========================================
   UIController — DOM渲染与交互
   ======================================== */
const UIController = {
  /* ---- DOM 引用 ---- */
  _dom: {},
  _streamingBubble: null,
  _attachedImages: [],  // 当前已附加的图片（base64 data URLs）

  init() {
    this._dom = {
      sidebar: document.getElementById('sidebar'),
      chatList: document.getElementById('chatList'),
      chatMessages: document.getElementById('chatMessages'),
      chatTitle: document.getElementById('chatTitle'),
      chatInput: document.getElementById('chatInput'),
      emptyState: document.getElementById('emptyState'),
      btnNewChat: document.getElementById('btnNewChat'),
      btnSend: document.getElementById('btnSend'),
      btnImage: document.getElementById('btnImage'),
      imgInput: document.getElementById('imgInput'),
      imgPreview: document.getElementById('imgPreview'),
      imgPreviewWrap: document.getElementById('imgPreviewWrap'),
      btnSettings: document.getElementById('btnSettings'),
      btnClearAll: document.getElementById('btnClearAll'),
      settingsPanel: document.getElementById('settingsPanel'),
      settingsOverlay: document.getElementById('settingsOverlay'),
      toastContainer: document.getElementById('toastContainer'),
      userProfileArea: document.getElementById('userProfileArea'),
      profileArea: document.getElementById('profileArea'),
      mainArea: document.getElementById('mainArea'),
    };

    this._bindEvents();
    this._bindSettingsEvents();
    this._loadSettingsToForm();
    this._renderUserProfileCard();  // 用户画像全局持久，只渲染一次
    this._renderSidebar();
    this._loadLastChat();
    this._checkFirstRun();
  },

  /* ---- 事件绑定 ---- */
  _bindEvents() {
    this._dom.btnNewChat.addEventListener('click', () => this._newChat());
    this._dom.btnSend.addEventListener('click', () => this._send());
    this._dom.chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        this._send();
      }
    });
    this._dom.chatInput.addEventListener('input', () => {
      this._dom.chatInput.style.height = 'auto';
      this._dom.chatInput.style.height = Math.min(this._dom.chatInput.scrollHeight, 120) + 'px';
    });

    // 图片上传
    this._dom.btnImage.addEventListener('click', () => this._dom.imgInput.click());
    this._dom.imgInput.addEventListener('change', (e) => this._handleImageFiles(e.target.files));
    this._dom.chatInput.addEventListener('paste', (e) => this._handlePaste(e));

    this._dom.btnSettings.addEventListener('click', () => this._toggleSettings());
    this._dom.btnClearAll.addEventListener('click', () => this._clearAllChats());

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'n') {
        e.preventDefault();
        this._newChat();
      }
      if (e.ctrlKey && e.key === ',') {
        e.preventDefault();
        this._toggleSettings(true);
      }
      if (e.key === 'Escape' && this._dom.settingsPanel.classList.contains('open')) {
        this._toggleSettings(false);
      }
    });
  },

  /* ---- 侧边栏渲染 ---- */
  _renderSidebar() {
    const chats = StorageManager.getAllChats();
    const currentId = ChatManager._currentChatId;
    this._dom.chatList.innerHTML = '';

    chats.forEach(chat => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (chat.id === currentId ? ' active' : '');
      item.dataset.chatId = chat.id;

      const icon = document.createElement('span');
      icon.className = 'chat-icon';
      icon.textContent = '💬';

      const title = document.createElement('span');
      title.className = 'chat-title';
      title.textContent = chat.title;

      const delBtn = document.createElement('button');
      delBtn.className = 'chat-delete';
      delBtn.textContent = '×';
      delBtn.title = '删除对话';

      item.appendChild(icon);
      item.appendChild(title);
      item.appendChild(delBtn);
      this._dom.chatList.appendChild(item);

      item.addEventListener('click', (e) => {
        if (e.target === delBtn) return;
        this._switchToChat(chat.id);
      });

      item.addEventListener('dblclick', (e) => {
        if (e.target === delBtn) return;
        this._renameChat(chat.id, title);
      });

      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        this._deleteChat(chat.id);
      });
    });
  },

  /* ---- 图片上传处理 ---- */

  /** 处理文件选择器返回的图片 */
  async _handleImageFiles(files) {
    if (!files || files.length === 0) return;
    for (const file of files) {
      if (!file.type.startsWith('image/')) continue;
      try {
        const dataUrl = await ImageUtils.compress(file);
        this._attachedImages.push(dataUrl);
      } catch (e) {
        this._showToast('图片处理失败: ' + e.message, 'error');
      }
    }
    this._renderImagePreview();
    this._dom.imgInput.value = ''; // 允许重复选同一文件
  },

  /** 处理 Ctrl+V 粘贴图片 */
  async _handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault(); // 阻止粘贴图片base64到文本框
        const file = item.getAsFile();
        try {
          const dataUrl = await ImageUtils.compress(file);
          this._attachedImages.push(dataUrl);
          this._renderImagePreview();
        } catch (err) {
          this._showToast('图片处理失败: ' + err.message, 'error');
        }
        return; // 一次只处理一张图
      }
    }
  },

  /** 渲染图片预览区域 */
  _renderImagePreview() {
    const container = this._dom.imgPreview;
    container.innerHTML = '';
    this._attachedImages.forEach((dataUrl, idx) => {
      const div = document.createElement('div');
      div.className = 'img-preview';
      div.innerHTML = `
        <img src="${dataUrl}" alt="聊天截图预览">
        <span class="img-remove" data-idx="${idx}">✕</span>`;
      div.querySelector('.img-remove').addEventListener('click', (e) => {
        e.stopPropagation();
        this._attachedImages.splice(idx, 1);
        this._renderImagePreview();
      });
      container.appendChild(div);
    });

    const wrap = this._dom.imgPreviewWrap;
    if (this._attachedImages.length > 0) {
      wrap.style.display = 'block';
      this._dom.btnImage.classList.add('has-image');
    } else {
      wrap.style.display = 'none';
      this._dom.btnImage.classList.remove('has-image');
    }
  },

  _loadLastChat() {
    const chats = StorageManager.getAllChats();
    if (chats.length > 0) {
      this._switchToChat(chats[0].id);
    } else {
      this._newChat();
    }
  },

  _newChat() {
    const chat = ChatManager.createChat();
    this._renderSidebar();
    this._renderProfileCard();
    this._renderMessages();
    this._dom.chatTitle.textContent = '新对话';
    this._dom.chatInput.focus();
  },

  _switchToChat(chatId) {
    ChatManager.switchChat(chatId);
    this._renderSidebar();
    this._renderProfileCard();
    this._renderMessages();
    const chat = ChatManager.getCurrentChat();
    if (chat) this._dom.chatTitle.textContent = chat.title;
  },

  _deleteChat(chatId) {
    StorageManager.deleteChat(chatId);
    if (ChatManager._currentChatId === chatId) {
      ChatManager._currentChatId = null;
      this._loadLastChat();
    } else {
      this._renderSidebar();
    }
  },

  _renameChat(chatId, titleEl) {
    const chat = StorageManager.getChat(chatId);
    if (!chat) return;

    const input = document.createElement('input');
    input.className = 'chat-rename-input';
    input.value = chat.title;
    input.addEventListener('blur', () => {
      const newTitle = input.value.trim() || chat.title;
      chat.title = newTitle;
      StorageManager.saveChat(chat);
      this._renderSidebar();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = chat.title; input.blur(); }
    });
    titleEl.replaceWith(input);
    input.focus();
    input.select();
  },

  _clearAllChats() {
    if (!confirm('确定要清除全部对话吗？此操作不可撤销。建议先导出备份。')) return;
    StorageManager.saveAllChats([]);
    ChatManager._currentChatId = null;
    this._renderSidebar();
